<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SAC 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9357648949106745" crossorigin="anonymous"></script>
<style>
:root{--gold:#f5c518;--gold2:#d4a00a;--pink:#f472b6;--pink2:#db2777;--bg:#04070e;--s1:#080f1c;--s2:#0c1526;--s3:#101d32;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--text:#e8f0ff;--muted:#4a6880;--green:#00d68f;--red:#ff4454;--blue:#3d8ef0;--r:14px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
header{position:sticky;top:0;z-index:100;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(4,7,14,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo-area{display:flex;align-items:center;gap:11px}
.logo-img{height:44px;width:auto;filter:drop-shadow(0 0 10px rgba(245,197,24,0.4))}
.logo-title{font-family:'Anton',sans-serif;font-size:21px;letter-spacing:3px;background:linear-gradient(100deg,var(--gold) 0%,#fff 55%,var(--gold) 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 5s linear infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.logo-sub{font-size:9px;font-weight:500;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-top:2px}
.header-btns{display:flex;gap:8px;align-items:center}
.pro-admin-icon{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#b91c1c);border:none;color:#fff;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(239,68,68,0.35);transition:transform .2s;flex-shrink:0}
.pro-admin-icon:hover{transform:rotate(30deg)}
.sync-bar{display:flex;align-items:center;justify-content:space-between;padding:4px 14px;background:var(--s1);border-bottom:1px solid var(--border);font-size:10px;color:var(--muted)}
.sync-left{display:flex;align-items:center;gap:5px}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot.err{background:var(--red)}
.dot.loading{background:var(--gold);animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.btn-reload{background:none;border:1px solid var(--border);color:var(--muted);font-size:10px;padding:2px 8px;border-radius:5px;cursor:pointer}
.league-switcher{display:flex;gap:8px;padding:10px 12px;background:var(--s1);border-bottom:1px solid var(--border)}
.league-btn{flex:1;padding:9px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .18s}
.league-m.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border-color:transparent;box-shadow:0 3px 14px rgba(245,197,24,0.28)}
.league-f.active{background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff;border-color:transparent;box-shadow:0 3px 14px rgba(244,114,182,0.28)}
.nav{display:flex;background:var(--s1);border-bottom:1px solid var(--border);padding:0 6px}
.nav-btn{flex:1;padding:16px 4px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:600;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;position:relative;transition:color .18s;white-space:nowrap}
.nav-btn::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;border-radius:2px 2px 0 0;background:linear-gradient(90deg,var(--gold),var(--gold2));transform:scaleX(0);transition:transform .2s cubic-bezier(.4,0,.2,1)}
.nav-btn.active{color:var(--gold)}
.nav-btn.active::after{transform:scaleX(1)}
.container{display:none;padding:12px 10px 90px}
.container.active{display:block}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.card-head{display:flex;align-items:center;gap:10px;padding:11px 14px 9px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,var(--s2),var(--s1))}
.group-badge{width:26px;height:26px;border-radius:7px;flex-shrink:0;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:13px;color:#000}
.card-title{font-family:'Anton',sans-serif;font-size:13px;letter-spacing:2px}
.standings-table{width:100%;border-collapse:collapse}
.standings-table th{background:rgba(255,255,255,0.02);color:var(--muted);font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:7px 10px;text-align:center}
.standings-table th:nth-child(2){text-align:left}
.standings-table td{padding:10px;text-align:center;border-top:1px solid rgba(255,255,255,0.03);font-size:13px;font-weight:500}
.standings-table td:nth-child(2){text-align:left;font-weight:700}
.standings-table td:nth-child(1){color:var(--muted);font-size:11px;font-weight:700}
.standings-table tr.qual-row td{background:rgba(0,214,143,0.035)}
.standings-table tr.qual-row td:nth-child(2){color:var(--green)}
.standings-table tr.qual-row td:nth-child(1)::before{content:'';display:inline-block;width:2px;height:11px;background:var(--green);border-radius:1px;margin-right:7px;vertical-align:middle}
.standings-table tr:hover td{background:rgba(255,255,255,0.025)}
.match-row{display:grid;grid-template-columns:1fr 68px 1fr;align-items:center;padding:11px 12px;border-top:1px solid rgba(255,255,255,0.035);transition:background .12s;gap:6px}
.match-row:hover{background:rgba(255,255,255,0.02)}
.match-row.clickable{cursor:pointer}
.match-row.clickable:active{background:rgba(245,197,24,0.06)}
.match-team-name{font-weight:600;font-size:12px;line-height:1.3}
.match-team-name.home{text-align:left}
.match-team-name.away{text-align:right}
.score-pill{background:rgba(245,197,24,0.07);border:1px solid rgba(245,197,24,0.14);border-radius:9px;text-align:center;padding:5px 3px}
.score-pill-num{font-family:'Anton',sans-serif;font-size:19px;letter-spacing:2px;color:var(--gold);line-height:1}
.score-pill-vs{cursor:pointer;transition:border-color .15s,background .15s}
.score-pill-vs:hover{border-color:rgba(245,197,24,0.35);background:rgba(245,197,24,0.05)}
.score-pill-vs-label{font-family:'Anton',sans-serif;font-size:13px;letter-spacing:1px;color:var(--muted)}
.mvp-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--gold);background:rgba(245,197,24,0.07);border:1px solid rgba(245,197,24,0.12);border-radius:20px;padding:4px 10px;margin:0 12px 9px}
.show-more-btn{display:block;width:100%;padding:10px;background:none;border:none;border-top:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:600;font-size:12px;cursor:pointer;letter-spacing:.5px;transition:color .15s,background .15s}
.show-more-btn:hover{color:var(--gold);background:rgba(245,197,24,0.04)}
.scorer-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04);transition:background .12s}
.scorer-item:last-child{border-bottom:none}
.scorer-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;overflow:hidden;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;background:var(--s2);font-weight:700;font-size:13px;color:var(--muted)}
.scorer-avatar img{width:100%;height:100%;object-fit:cover}
.scorer-info{flex:1}
.scorer-name{font-weight:700;font-size:14px}
.scorer-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:10px}
.meta-goals{color:var(--gold);font-weight:600}
.scorer-pos{font-family:'Anton',sans-serif;font-size:22px;min-width:26px;text-align:center;line-height:1}
.pos-1{color:var(--gold);text-shadow:0 0 16px rgba(245,197,24,0.45)}
.pos-2{color:#9fb0c0}.pos-3{color:#b07840}.pos-other{color:var(--muted);font-size:15px}
.btn{border:none;padding:10px 18px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .18s;letter-spacing:.3px;display:inline-flex;align-items:center;gap:6px}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;box-shadow:0 3px 16px rgba(245,197,24,0.22)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-danger{background:rgba(255,68,84,0.09);color:var(--red);border:1px solid rgba(255,68,84,0.18);padding:4px 10px;font-size:12px;border-radius:7px}
.btn-blue{background:rgba(61,142,240,0.1);color:var(--blue);border:1px solid rgba(61,142,240,0.2);width:100%;padding:10px;border-radius:var(--rs);justify-content:center}
.btn-green{background:linear-gradient(135deg,#00d68f,#00a86b);color:#000;width:100%;padding:13px;border-radius:12px;font-size:15px;justify-content:center;margin-top:12px;box-shadow:0 3px 16px rgba(0,214,143,0.2)}
.btn-back{background:rgba(61,142,240,0.07);color:var(--blue);border:1px solid rgba(61,142,240,0.14);border-radius:var(--rs);margin-bottom:12px}
.btn-delete-result{display:block;width:100%;margin-top:10px;padding:11px;background:rgba(255,68,84,0.07);border:1px solid rgba(255,68,84,0.18);color:var(--red);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:background .18s}
.popup{position:fixed;inset:0;background:rgba(0,0,0,0.72);display:none;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(8px)}
.popup-sheet{background:var(--s2);border:1px solid var(--border);border-bottom:none;border-radius:20px 20px 0 0;padding:6px 16px 36px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;animation:slide-up .28s cubic-bezier(.4,0,.2,1)}
@keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:10px auto 16px}
.sheet-title{font-family:'Anton',sans-serif;font-size:17px;letter-spacing:2px;color:var(--gold);text-align:center;margin-bottom:18px}
.form-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:12px 0 5px;display:block}
input,select,textarea{width:100%;padding:10px 13px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .18s;box-sizing:border-box}
input:focus,select:focus,textarea:focus{border-color:rgba(245,197,24,0.5);background:rgba(245,197,24,0.04)}
textarea{resize:vertical}
select option{background:var(--s2)}
.section-divider{font-family:'Anton',sans-serif;font-size:12px;letter-spacing:2px;color:var(--muted);margin:16px 0 9px;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.p-row{display:flex;align-items:center;gap:10px;padding:8px 11px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px}
.p-avatar{width:30px;height:30px;border-radius:50%;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;overflow:hidden}
.p-avatar img{width:100%;height:100%;object-fit:cover}
.p-name{flex:1;font-weight:600;font-size:13px}
.p-goals{font-size:12px;color:var(--gold);margin-right:6px}
.p-actions{display:flex;gap:6px;align-items:center}
.score-hero{background:linear-gradient(160deg,#091522 0%,#04070e 100%);padding:28px 20px 22px;text-align:center;position:relative;overflow:hidden}
.score-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(245,197,24,0.07) 0%,transparent 65%)}
.score-hero-num{font-family:'Anton',sans-serif;font-size:68px;letter-spacing:10px;color:var(--gold);line-height:1;position:relative;text-shadow:0 0 35px rgba(245,197,24,0.25)}
.score-hero-teams{display:flex;justify-content:space-between;margin-top:10px;font-size:11px;font-weight:600;color:var(--muted);position:relative}
.poll-3grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.poll-opt{position:relative;border:1px solid var(--border);border-radius:11px;overflow:hidden;cursor:pointer;height:68px;transition:border-color .18s,transform .12s}
.poll-opt:hover{transform:translateY(-2px)}
.poll-bar-fill{position:absolute;left:0;top:0;bottom:0;transition:width .45s ease;border-radius:10px}
.poll-opt-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:3px}
.poll-choice{font-family:'Anton',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;transition:color .18s}
.poll-pct{font-size:11px;font-weight:700;transition:color .18s}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(70px);padding:11px 22px;border-radius:100px;font-weight:700;font-size:14px;z-index:300;display:none;white-space:nowrap;transition:transform .26s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 32px rgba(0,0,0,0.55)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green);color:#000;display:block}
.toast.err{background:var(--red);color:#fff;display:block}
.news-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .18s,transform .15s}
.news-card:hover{transform:translateY(-1px)}
.news-pinned{border-color:rgba(245,197,24,0.35)!important;background:linear-gradient(180deg,rgba(245,197,24,0.04) 0%,transparent 60px)!important}
.news-card-head{display:flex;align-items:center;gap:10px;padding:12px 14px 8px}
.news-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px}
.news-meta{flex:1}
.news-author{font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px}
.news-date{font-size:10px;color:var(--muted);margin-top:2px}
.news-title{font-family:'Anton',sans-serif;font-size:16px;letter-spacing:1px;padding:0 14px 8px;line-height:1.3}
.news-body{font-size:13px;color:#8aaccc;padding:0 14px 14px;line-height:1.6;white-space:pre-wrap}
.news-media{width:100%;max-height:240px;object-fit:cover;display:block}
.news-media-audio{width:100%;padding:10px 14px 14px;display:block}
.news-media-video{width:100%;max-height:240px;display:block;background:#000}
.media-upload-btn{display:flex;align-items:center;gap:10px;padding:11px 13px;background:rgba(255,255,255,0.03);border:1px dashed var(--border);border-radius:var(--rs);cursor:pointer;font-size:13px;color:var(--muted);transition:border-color .18s}
.media-upload-btn:hover{border-color:var(--gold);color:var(--gold)}
.news-empty{text-align:center;padding:50px 20px;color:var(--muted)}
.news-league-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.5px}
.badge-m{background:rgba(245,197,24,0.13);color:var(--gold)}
.badge-f{background:rgba(244,114,182,0.13);color:var(--pink)}
.news-league-btn{flex:1;padding:9px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .18s}
.news-league-btn#nlBtnM.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border-color:transparent}
.news-league-btn#nlBtnF.active{background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff;border-color:transparent}
.pin-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--gold);background:rgba(245,197,24,0.12);border-radius:20px;padding:2px 8px;letter-spacing:.5px}
.npoll-wrap{margin:0 14px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:11px;overflow:hidden}
.npoll-question{font-weight:700;font-size:13px;padding:11px 13px 9px;border-bottom:1px solid var(--border)}
.npoll-option{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;position:relative;overflow:hidden;transition:background .15s}
.npoll-option:last-child{border-bottom:none}
.npoll-option.voted{cursor:default}
.npoll-bar{position:absolute;left:0;top:0;bottom:0;background:rgba(245,197,24,0.08);transition:width .5s ease;border-radius:0 6px 6px 0}
.npoll-bar.mine{background:rgba(245,197,24,0.14)}
.npoll-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.npoll-dot.checked{background:var(--gold);border-color:var(--gold)}
.npoll-dot.checked::after{content:'';width:6px;height:6px;border-radius:50%;background:#000}
.npoll-label{flex:1;font-size:13px;font-weight:500;position:relative;z-index:1}
.npoll-pct{font-size:12px;font-weight:700;color:var(--muted);position:relative;z-index:1;min-width:32px;text-align:right}
.npoll-pct.mine{color:var(--gold)}
.npoll-footer{padding:7px 13px;font-size:10px;color:var(--muted);border-top:1px solid var(--border);letter-spacing:.5px}
.poll-builder{margin-top:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:11px;padding:12px;display:none}
.poll-builder.open{display:block}
.poll-option-row{display:flex;gap:8px;align-items:center;margin-bottom:7px}
.poll-option-row input{margin:0}
.poll-option-row button{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:0 4px;flex-shrink:0}
.toggle-poll-btn{width:100%;padding:9px;margin-top:8px;background:rgba(255,255,255,0.03);border:1px dashed var(--border);border-radius:var(--rs);color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .18s}
.toggle-poll-btn:hover{border-color:var(--gold);color:var(--gold)}
.empty-state{text-align:center;padding:36px 20px;color:var(--muted)}
.empty-icon{font-size:38px;margin-bottom:10px}
.empty-text{font-size:14px}
#splash{position:fixed;inset:0;z-index:9999;background:#04070e;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease,transform .5s ease}
#splash.hide{opacity:0;transform:scale(1.04);pointer-events:none!important}
.splash-logo{width:110px;height:auto;filter:drop-shadow(0 0 30px rgba(245,197,24,0.6));animation:sli .7s cubic-bezier(.2,.8,.3,1) both}
@keyframes sli{from{opacity:0;transform:scale(.7) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.splash-title{font-family:'Anton',sans-serif;font-size:36px;letter-spacing:6px;margin-top:20px;background:linear-gradient(100deg,var(--gold) 0%,#fff 50%,var(--gold) 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:sli .7s .15s cubic-bezier(.2,.8,.3,1) both,shimmer 4s 1s linear infinite}
.splash-sub{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:5px;text-transform:uppercase;margin-top:6px;animation:sli .7s .25s cubic-bezier(.2,.8,.3,1) both}
.splash-bar-wrap{width:160px;height:2px;background:rgba(255,255,255,0.07);border-radius:2px;margin-top:40px;overflow:hidden;animation:sli .5s .35s both}
.splash-bar{height:100%;width:0%;border-radius:2px;background:linear-gradient(90deg,var(--gold),#fff,var(--gold));background-size:200% auto;animation:sfill 1.8s .4s cubic-bezier(.4,0,.2,1) forwards,shimmer 1.5s .4s linear infinite}
@keyframes sfill{0%{width:0%}60%{width:75%}85%{width:90%}100%{width:100%}}
.splash-status{font-size:10px;color:var(--muted);letter-spacing:1.5px;margin-top:12px;text-transform:uppercase;animation:sli .5s .4s both;min-height:14px}
/* PRONOSTICI */
.pro-topbar{background:linear-gradient(135deg,var(--s2),var(--s1));border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}

<script>

// ══════════════════════════════════════
// COSTANTI
// ══════════════════════════════════════
const BIN_ID = "69d681f3856a6821891087c0"
const API_KEY = "$2a$10$x.dSFPS14HXK3N5haPJtm.NxD/i2mFa0.60RKp92TL6nihvWQc06a"
const BIN_URL = "https://api.jsonbin.io/v3/b/" + BIN_ID
const PASSWORD_HASH = "5d28a834728f3baeb111d317aa4606f5bb82c0ce762b534ec91c23c0ed54031a"

const groupsDef = {
  A: ["🇦🇷 5DE","🇧🇪 3AC","🇵🇦 2EE","🇲🇦 2AC","🇪🇸 1C"],
  B: ["🇮🇹 4DE (1)","🇭🇷 4DE (2)","🇨🇭 2DE","🇰🇷 3BS","🇲🇽 1AC"],
  C: ["🇳🇱 4CS","🇳🇴 3DE","🇺🇾 4BC","🇸🇦 4AM","🇯🇵 1EE"],
  D: ["🇧🇷 5CC","🇵🇹 5AC","🇪🇬 3CC","🇪🇨 5DOI"]
}
const groupsDefF = {
  A: ["🇵🇹 5AC","🇩🇪 5BC","🇳🇿 2AS","🇺🇸 2CC (1)"],
  B: ["🇫🇷 4AC","🇳🇱 4CS","🇨🇦 2CS","🇦🇹 2CC (2)"],
  C: ["🇦🇺 5AS","🇧🇷 5CC","🏴󠁧󠁢󠁥󠁮󠁧󠁿 3ES","🇲🇦 2AC"],
  D: ["🇰🇷 3BS","🇨🇴 5AM","🇺🇾 4BC"]
}

let activeLeague = "M"
let admin = false
let editMatch = null
let tempScorersA = [], tempScorersB = []
let matches = [], matchesF = [], playerImages = {}, newsList = []
let scorers = {}, mvpCount = {}, scorersF = {}, mvpCountF = {}
let editingNewsId = null, pendingMediaB64 = null, pendingMediaType = null, pendingNewsLeague = "M", pendingPin = false, pollBuilderOpen = false

function generateMatches(def) {
  let out = [], id = 0
  Object.entries(def).forEach(([g, teams]) => {
    for (let i=0;i<teams.length;i++)
      for (let j=i+1;j<teams.length;j++)
        out.push({id:id++,group:g,a:teams[i],b:teams[j],g1:null,g2:null,mvp:"",played:false,scorersA:[],scorersB:[]})
  })
  return out
}

function activeData() {
  return activeLeague === "M"
    ? {def:groupsDef, matches, scorers, mvpCount}
    : {def:groupsDefF, matches:matchesF, scorers:scorersF, mvpCount:mvpCountF}
}

function setSyncStatus(s,l) {
  document.getElementById('syncDot').className='dot '+s
  document.getElementById('syncLabel').textContent=l
}

async function binLoad() {
  setSyncStatus("loading","Caricamento...")
  try {
    const res = await fetch(BIN_URL+"/latest",{headers:{"X-Master-Key":API_KEY}})
    if (!res.ok) throw new Error("HTTP "+res.status)
    const data = (await res.json()).record
    matches = (data.matches&&data.matches.length) ? data.matches : generateMatches(groupsDef)
    matchesF = (data.matchesF&&data.matchesF.length) ? data.matchesF : generateMatches(groupsDefF)
    playerImages = data.playerImages||{}
    newsList = data.news||[]
    // Carica dati pronostici: MERGE (locale + JSONBin, JSONBin vince per altri utenti)
    if(data.proUsers){
      // JSONBin vince per credenziali - aggiungi solo utenti locali non ancora su server
      var localU=JSON.parse(localStorage.getItem('sac_pro_users')||'{}');
      var mergedU=Object.assign({},localU,data.proUsers); // JSONBin vince
      localStorage.setItem('sac_pro_users',JSON.stringify(mergedU));
    }
    if(data.proData){
      // JSONBin è la fonte di verità
      // Per l'utente corrente: prendi il dato con più token (protezione da race condition)
      var localD=JSON.parse(localStorage.getItem('sac_pro_data')||'{}');
      var serverD=data.proData;
      var sess=JSON.parse(localStorage.getItem('sac_pro_session')||'null');
      var mergedD=Object.assign({},localD,serverD); // JSONBin vince su tutti
      // Eccezione: se l'utente corrente ha dati locali PIÙ AGGIORNATI (più token o più scommesse)
      if(sess&&sess.username&&localD[sess.username]&&serverD[sess.username]){
        var loc=localD[sess.username],srv=serverD[sess.username];
        // Prendi il dato locale se ha più token o storia più lunga
        if((loc.tokens||0)>(srv.tokens||0)||(loc.storia||[]).length>(srv.storia||[]).length){
          mergedD[sess.username]=loc;
        }
      } else if(sess&&sess.username&&localD[sess.username]&&!serverD[sess.username]){
        // Utente registrato localmente ma non ancora su server
        mergedD[sess.username]=localD[sess.username];
      }
      localStorage.setItem('sac_pro_data',JSON.stringify(mergedD));
    }
    setSyncStatus("ok","Sincronizzato ✓")
  } catch(e) {
    setSyncStatus("err","Errore connessione")
    matches = generateMatches(groupsDef)
    matchesF = generateMatches(groupsDefF)
    playerImages = {}; newsList = []
    showToast("Errore connessione","err")
  }
}

async function binSave() {
  setSyncStatus("loading","Salvataggio...")
  try {
    const res = await fetch(BIN_URL,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify({matches:matches,matchesF:matchesF,playerImages:playerImages,news:newsList,proUsers:JSON.parse(localStorage.getItem('sac_pro_users')||'{}'),proData:JSON.parse(localStorage.getItem('sac_pro_data')||'{}')})})
    if (!res.ok) throw new Error("HTTP "+res.status)
    const ora = new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"})
    setSyncStatus("ok","Salvato alle "+ora+" ✓")
    return true
  } catch(e) {
    setSyncStatus("err","Errore salvataggio")
    return false
  }
}

async function hashPassword(pwd) {
  const buf = await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pwd))
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("")
}

function openLogin() { loginPopup.style.display="flex" }

async function doLogin() {
  const lockUntil = parseInt(localStorage.getItem('lock_until')||'0')
  if (Date.now() < lockUntil) {
    const mins = Math.ceil((lockUntil - Date.now()) / 60000)
    alert(`Troppi tentativi. Riprova tra ${mins} minuto${mins>1?'i':''}`)
    return
  }
  if (await hashPassword(pass.value) === PASSWORD_HASH) {
    localStorage.removeItem('login_attempts'); localStorage.removeItem('lock_until')
    admin=true; loginPopup.style.display="none"
    logoutBtn.style.display="inline-block"; loginBtn.style.display="none"
    pass.value=""; renderMatches()
  } else {
    const attempts = parseInt(localStorage.getItem('login_attempts')||'0') + 1
    localStorage.setItem('login_attempts', attempts)
    if (attempts >= 3) { localStorage.setItem('lock_until', Date.now() + 60*60*1000); localStorage.removeItem('login_attempts'); alert('Troppi tentativi errati. Account bloccato per 1 ora.') }
    else alert(`Password errata. Tentativi rimasti: ${3 - attempts}`)
    pass.value=""
  }
}

function logout() {
  admin=false; logoutBtn.style.display="none"; loginBtn.style.display="inline-block"
  document.getElementById('newsFab').style.display='none'; renderMatches()
}

function changePage(p, btn) {
  document.querySelectorAll(".container").forEach(c=>c.classList.remove("active"))
  document.getElementById(p).classList.add("active")
  if (btn) { document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active")); btn.classList.add("active") }
  document.getElementById('newsFab').style.display = (admin && p==='notizie') ? 'flex' : 'none'
  if (p==='pronostici') renderPronostici()
  const hBtn = document.getElementById('proAdminHeaderBtn')
  if (hBtn) hBtn.style.display = (p==='pronostici' && proAdminLogged) ? 'flex' : 'none'
}

function switchLeague(l) {
  activeLeague=l
  document.getElementById('btnM').classList.toggle('active',l==='M')
  document.getElementById('btnF').classList.toggle('active',l==='F')
  changePage('classifica',document.getElementById('navClassifica'))
  renderTable(); renderMatches(); renderScorers()
}

function renderTable() {
  const {def,matches} = activeData()
  let table={}
  Object.values(def).flat().forEach(t=>{table[t]={pt:0,gf:0,gs:0,dr:0}})
  matches.forEach(m=>{
    if(!m.played) return
    table[m.a].gf+=m.g1; table[m.a].gs+=m.g2
    table[m.b].gf+=m.g2; table[m.b].gs+=m.g1
    if(m.g1>m.g2) table[m.a].pt+=3
    else if(m.g2>m.g1) table[m.b].pt+=3
    else{table[m.a].pt++;table[m.b].pt++}
  })
  Object.keys(table).forEach(t=>{table[t].dr=table[t].gf-table[t].gs})
  let html=""
  Object.entries(def).forEach(([g,teams])=>{
    const sorted=[...teams].sort((a,b)=>{
      if(table[b].pt!==table[a].pt) return table[b].pt-table[a].pt
      if(table[b].dr!==table[a].dr) return table[b].dr-table[a].dr
      return table[b].gf-table[a].gf
    })
    html+=`<div class="card"><div class="card-head"><div class="group-badge">${g}</div><div class="card-title">Girone ${g}</div></div>
    <table class="standings-table"><thead><tr><th>#</th><th>Squadra</th><th>PT</th><th>DR</th><th>GF</th><th>GS</th></tr></thead><tbody>
    ${sorted.map((t,i)=>`<tr class="${i<2?'qual-row':''}"><td>${i+1}</td><td>${t}</td><td>${table[t].pt}</td><td style="color:${table[t].dr>=0?'var(--text)':'var(--red)'}">${table[t].dr>0?'+':''}${table[t].dr}</td><td>${table[t].gf}</td><td>${table[t].gs}</td></tr>`).join("")}
    </tbody></table></div>`
  })
  classifica.innerHTML=html
}

function getVotes(id) {
  const {matches} = activeData()
  const m = matches.find(x => x.id === parseInt(id))
  return (m && m.pollVotes) ? m.pollVotes : {"1":0,"x":0,"2":0}
}
const getUserVote = id => localStorage.getItem('suv_'+id)||null

async function castVote(matchId, choice) {
  matchId = parseInt(matchId)
  const prev = getUserVote(matchId)
  const isRemoving = prev === choice
  if (isRemoving) localStorage.removeItem('suv_'+matchId)
  else localStorage.setItem('suv_'+matchId, choice)
  const arr = activeLeague === "M" ? matches : matchesF
  const m = arr.find(x => x.id === matchId); if (!m) return
  if (!m.pollVotes) m.pollVotes = {"1":0,"x":0,"2":0}
  if (prev) m.pollVotes[prev] = Math.max(0, (m.pollVotes[prev]||0) - 1)
  if (!isRemoving) m.pollVotes[choice] = (m.pollVotes[choice]||0) + 1
  const newUv = isRemoving ? null : choice
  updatePollPill(matchId, m.pollVotes, newUv)
  if (pollPopup.style.display==='flex') openPoll(matchId, m.a, m.b)
  setSyncStatus("loading", "Salvataggio voto...")
  try {
    const res = await fetch(BIN_URL, {method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify({matches:matches,matchesF:matchesF,playerImages:playerImages,news:newsList,proUsers:JSON.parse(localStorage.getItem('sac_pro_users')||'{}'),proData:JSON.parse(localStorage.getItem('sac_pro_data')||'{}')})})
    if(res.ok) setSyncStatus("ok","Voto salvato ✓")
    else setSyncStatus("err","Errore voto")
  } catch(e) { setSyncStatus("err","Errore connessione") }
}

function updatePollPill(matchId,votes,uv) {
  const total=(votes["1"]||0)+(votes["x"]||0)+(votes["2"]||0)
  const c=uv==="1"?"#3d8ef0":uv==="x"?"#f5c518":uv==="2"?"#ff4454":null
  document.querySelectorAll('[data-pollid="'+matchId+'"]').forEach(pill=>{
    if(uv){pill.innerHTML=`<div style="font-family:'Anton',sans-serif;font-size:16px;color:${c};letter-spacing:1px;line-height:1">${uv.toUpperCase()}</div><div style="font-size:9px;color:var(--muted);margin-top:1px">${total}v</div>`;pill.style.borderColor=c+'44';pill.style.background=c+'10'}
    else if(total>0){pill.innerHTML=`<div class="score-pill-vs-label">vs</div><div style="font-size:9px;color:var(--muted);margin-top:1px">${total}v</div>`;pill.style.borderColor='';pill.style.background=''}
    else{pill.innerHTML=`<div class="score-pill-vs-label">vs</div><div style="font-size:8px;color:var(--muted);margin-top:1px">vota</div>`;pill.style.borderColor='';pill.style.background=''}
  })
}

function openPoll(matchId,teamA,teamB) {
  matchId=parseInt(matchId);
  var uv=getUserVote(matchId);
  function mkBtn(v,k,label,color){
    var active=uv===k;
    var total=(v["1"]||0)+(v["x"]||0)+(v["2"]||0);
    var p=total===0?33:Math.round(((v[k]||0)/total)*100);
    var el=document.createElement('div');
    el.className='poll-opt';
    el.style.cssText='border-color:'+(active?color+'55':'var(--border)')+';background:'+(active?color+'12':'transparent');
    el.innerHTML='<div class="poll-bar-fill" style="width:'+p+'%;background:'+color+'16"></div>'
      +'<div class="poll-opt-inner">'
      +'<span class="poll-choice" style="color:'+(active?color:'var(--text)')+'">'+label+'</span>'
      +'<span class="poll-pct" style="color:'+(active?color:'var(--muted)')+'">'+p+'%</span>'
      +'</div>';
    el.addEventListener('click',function(){castVote(matchId,k);});
    return el;
  }
  function renderPollSheet(v){
    var total=(v["1"]||0)+(v["x"]||0)+(v["2"]||0);
    var sheet=document.getElementById('pollSheet');
    // Svuota e ricostruisci
    sheet.innerHTML='';
    var hd=document.createElement('div');hd.className='sheet-handle';sheet.appendChild(hd);
    var t1=document.createElement('div');t1.className='sheet-title';t1.style.cssText='font-size:14px;margin-bottom:4px';t1.textContent=teamA;sheet.appendChild(t1);
    var t2=document.createElement('div');t2.style.cssText='text-align:center;color:var(--muted);font-size:11px;margin-bottom:14px';t2.textContent='vs '+teamB;sheet.appendChild(t2);
    var lbl=document.createElement('div');lbl.style.cssText='font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px';
    lbl.innerHTML='Chi vince?'+(total>0?' <span style="color:var(--gold);margin-left:6px">'+total+' voti</span>':'');
    sheet.appendChild(lbl);
    var grid=document.createElement('div');grid.className='poll-3grid';
    grid.appendChild(mkBtn(v,"1","1","#3d8ef0"));
    grid.appendChild(mkBtn(v,"x","X","#f5c518"));
    grid.appendChild(mkBtn(v,"2","2","#ff4454"));
    sheet.appendChild(grid);
    if(uv){var note=document.createElement('div');note.style.cssText='text-align:center;font-size:11px;color:var(--muted);margin-top:10px';note.textContent='Riclicca per togliere il voto';sheet.appendChild(note);}
    var cl=document.createElement('button');cl.className='btn btn-ghost';cl.style.cssText='width:100%;justify-content:center;margin-top:14px';cl.textContent='Chiudi';
    cl.addEventListener('click',function(){pollPopup.style.display='none';});
    sheet.appendChild(cl);
  }
  renderPollSheet(getVotes(matchId));
  pollPopup.style.display='flex';
  // Aggiorna live dal server
  fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY}})
  .then(function(r){return r.json();})
  .then(function(data){
    var arr=activeLeague==='M'?data.record.matches:data.record.matchesF;
    if(!arr) return;
    var mt=arr.find(function(x){return x.id===matchId;});
    if(mt&&mt.pollVotes){
      var la=activeLeague==='M'?matches:matchesF;
      var lm=la.find(function(x){return x.id===matchId;});
      if(lm) lm.pollVotes=mt.pollVotes;
      if(pollPopup.style.display==='flex') renderPollSheet(mt.pollVotes);
    }
  }).catch(function(){});
}

function matchRowHTML(x) {
  const votes=getVotes(x.id),uv=getUserVote(x.id),total=(votes["1"]||0)+(votes["x"]||0)+(votes["2"]||0)
  if(x.played){return `<div class="match-row ${admin?'clickable':''}" onclick="${admin?'openMatch('+x.id+')':''}"><div class="match-team-name home">${x.a}</div><div class="score-pill"><div class="score-pill-num">${x.g1}-${x.g2}</div></div><div class="match-team-name away">${x.b}</div></div>${x.mvp?`<div style="padding:0 12px 8px"><div class="mvp-pill">⭐ ${x.mvp}</div></div>`:''}`}
  const c=uv==="1"?"#3d8ef0":uv==="x"?"#f5c518":uv==="2"?"#ff4454":null
  return `<div class="match-row ${admin?'clickable':''}" onclick="${admin?'openMatch('+x.id+')':''}"><div class="match-team-name home">${x.a}</div><div class="score-pill score-pill-vs" data-pollid="${x.id}" onclick="event.stopPropagation();openPoll(${x.id},'${x.a}','${x.b}')" style="${uv?'border-color:'+c+'44;background:'+c+'10':''}">
    ${uv?`<div style="font-family:'Anton',sans-serif;font-size:16px;color:${c};letter-spacing:1px;line-height:1">${uv.toUpperCase()}</div><div style="font-size:9px;color:var(--muted);margin-top:1px">${total}v</div>`:`<div class="score-pill-vs-label">vs</div><div style="font-size:8px;color:var(--muted);margin-top:1px">vota</div>`}
  </div><div class="match-team-name away">${x.b}</div></div>`
}

function toggleMore(gid) {
  const more=document.getElementById(gid+'_more'),btn=document.getElementById(gid+'_btn')
  const h=more.style.display==='none'
  more.style.display=h?'block':'none'
  btn.textContent=h?'Mostra meno ▴':`Mostra altre ${btn.dataset.count} partite ▾`
}

function renderMatches() {
  const {def,matches}=activeData()
  let html=""
  Object.keys(def).forEach(g=>{
    const all=matches.filter(x=>x.group===g)
    const played=all.filter(x=>x.played),notPlayed=all.filter(x=>!x.played)
    const shuffled=[...notPlayed].sort((a,b)=>((a.id*7+g.charCodeAt(0)*3)%11)-((b.id*5+g.charCodeAt(0)*7)%11))
    const sorted=[...played,...shuffled]
    const gid='grp_'+activeLeague+'_'+g
    html+=`<div class="card"><div class="card-head"><div class="group-badge">${g}</div><div class="card-title">Girone ${g}</div><span style="margin-left:auto;font-size:10px;color:var(--muted)">${played.length}/${all.length}</span></div><div id="${gid}">${sorted.slice(0,4).map(matchRowHTML).join("")}</div>`
    if(sorted.length>4) html+=`<div id="${gid}_more" style="display:none">${sorted.slice(4).map(matchRowHTML).join("")}</div><button class="show-more-btn" id="${gid}_btn" data-count="${sorted.length-4}" onclick="toggleMore('${gid}')">Mostra altre ${sorted.length-4} partite ▾</button>`
    html+=`</div>`
  })

function rebuildScorers() {
  scorers={};mvpCount={}
  matches.forEach(m=>{if(!m.played)return;[...m.scorersA,...m.scorersB].forEach(s=>{const k=s.name.toLowerCase();if(!scorers[k])scorers[k]={name:s.name,goals:0};scorers[k].goals+=s.goals});if(m.mvp){const k=m.mvp.toLowerCase();mvpCount[k]=(mvpCount[k]||0)+1}})
  scorersF={};mvpCountF={}
  matchesF.forEach(m=>{if(!m.played)return;[...m.scorersA,...m.scorersB].forEach(s=>{const k=s.name.toLowerCase();if(!scorersF[k])scorersF[k]={name:s.name,goals:0};scorersF[k].goals+=s.goals});if(m.mvp){const k=m.mvp.toLowerCase();mvpCountF[k]=(mvpCountF[k]||0)+1}})

function openMatchView(m) {

function buildScorersUI(side) {
  let opts=""
  for(let i=1;i<=10;i++) opts+=`<option value="${i}">${i}</option>`
  return `<div class="section-divider">Marcatori ${side}</div><div id="list${side}"></div><input id="name${side}" placeholder="Nome giocatore" style="margin-bottom:7px"><select id="goal${side}" style="margin-bottom:7px">${opts}</select><button class="btn btn-blue" onclick="addScorer('${side}')">+ Aggiungi marcatore</button>`

function addScorer(side) {
  const name=document.getElementById('name'+side).value.trim()
  const goals=parseInt(document.getElementById('goal'+side).value)
  if(!name) return
  const arr=side==="A"?tempScorersA:tempScorersB
  const ex=arr.find(s=>s.name.toLowerCase()===name.toLowerCase())
  if(ex) ex.goals+=goals; else arr.push({name,goals})
  document.getElementById('name'+side).value=""
  renderTemp("A"); renderTemp("B")
}

function removeScorer(side,idx) {
  if(side==="A") tempScorersA.splice(idx,1); else tempScorersB.splice(idx,1)

}

function renderTemp(side) {
  const arr=side==="A"?tempScorersA:tempScorersB
  document.getElementById("list"+side).innerHTML=arr.map((s,i)=>{
    const initials=s.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2)

  }).join("")
}

async function uploadPhoto(e,name) {
  const file=e.target.files[0]; if(!file) return
  const reader=new FileReader()
  reader.onload=ev=>{
    const canvas=document.createElement('canvas'); canvas.width=60; canvas.height=60
    const img=new Image(); img.onload=()=>{
      const ctx=canvas.getContext('2d'),size=Math.min(img.width,img.height)
      ctx.drawImage(img,(img.width-size)/2,(img.height-size)/2,size,size,0,0,60,60)
      playerImages[name]=canvas.toDataURL('image/jpeg',0.5)
      renderTemp("A"); renderTemp("B"); renderScorers()
    }; img.src=ev.target.result
  }; reader.readAsDataURL(file)
}

async function saveMatch() {
  const {matches}=activeData(), m=matches.find(x=>x.id===editMatch)
  m.g1=parseInt(g1.value)||0; m.g2=parseInt(g2.value)||0
  m.mvp=mvp.value.trim(); m.played=true
  m.scorersA=[...tempScorersA]; m.scorersB=[...tempScorersB]

  resolveBets(m.id, m.g1, m.g2, m.mvp, activeLeague==='F')

  else showToast("Errore salvataggio!","err")
}

function deleteResult() {

function previewMedia(input) {
  const file=input.files[0]; if(!file) return
  document.getElementById('mediaUploadText').textContent='⏳ Caricamento...'
  const prev=document.getElementById('mediaPreview')
  if(file.type.startsWith('image')) {
    const img=new Image(),url=URL.createObjectURL(file)
    img.onload=()=>{const canvas=document.createElement('canvas');const max=600,ratio=Math.min(max/img.width,max/img.height,1);canvas.width=Math.round(img.width*ratio);canvas.height=Math.round(img.height*ratio);canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);URL.revokeObjectURL(url);pendingMediaB64=canvas.toDataURL('image/jpeg',0.6);pendingMediaType='image/jpeg';document.getElementById('mediaUploadText').textContent='✅ '+file.name;prev.innerHTML=`<img src="${pendingMediaB64}" style="width:100%;border-radius:10px;margin-top:8px;max-height:200px;object-fit:cover">`};img.src=url
  } else {
    const reader=new FileReader()
    reader.onload=ev=>{pendingMediaB64=ev.target.result;pendingMediaType=file.type;document.getElementById('mediaUploadText').textContent='✅ '+file.name;if(file.type.startsWith('video'))prev.innerHTML=`<video src="${pendingMediaB64}" style="width:100%;border-radius:10px;margin-top:8px" controls></video>`;else if(file.type.startsWith('audio'))prev.innerHTML=`<audio src="${pendingMediaB64}" style="width:100%;margin-top:8px" controls></audio>`}

  }
}

function voteNewsPoll(newsId,optIdx) {
  const prev=localStorage.getItem('npv_'+newsId)
  if(prev!==null&&parseInt(prev)===optIdx) return
  const n=newsList.find(x=>x.id===newsId); if(!n||!n.poll) return
  if(prev!==null) n.poll.options[parseInt(prev)].votes=Math.max(0,n.poll.options[parseInt(prev)].votes-1)
  n.poll.options[optIdx].votes++
  localStorage.setItem('npv_'+newsId,optIdx)
  renderNews(); binSave()
}

function newsPollHTML(n) {
  if(!n.poll) return ''
  const poll=n.poll,myVote=localStorage.getItem('npv_'+n.id),hasVoted=myVote!==null
  const total=poll.options.reduce((s,o)=>s+o.votes,0)
  return `<div class="npoll-wrap"><div class="npoll-question">${poll.question}</div>${poll.options.map((o,i)=>{const pct=total===0?0:Math.round((o.votes/total)*100),isMine=hasVoted&&parseInt(myVote)===i;return `<div class="npoll-option ${hasVoted?'voted':''}" onclick="${hasVoted?'':'voteNewsPoll('+n.id+','+i+')'}"><div class="npoll-bar ${isMine?'mine':''}" style="width:${hasVoted?pct:0}%"></div><div class="npoll-dot ${isMine?'checked':''}"></div><div class="npoll-label">${o.label}</div>${hasVoted?`<div class="npoll-pct ${isMine?'mine':''}">${pct}%</div>`:''}</div>`}).join("")}<div class="npoll-footer">${total} vot${total===1?'o':'i'}${!hasVoted?' · Clicca per votare':''}</div></div>`
}

async function initApp() {
  const setStatus=msg=>{const s=document.getElementById('splashStatus');if(s)s.textContent=msg}

}

var _syncProTimer=null;
function _syncPro(){
  clearTimeout(_syncProTimer);
  _syncProTimer=setTimeout(function(){
    var body={
      matches:matches,matchesF:matchesF,playerImages:playerImages,news:newsList,
      proUsers:JSON.parse(localStorage.getItem('sac_pro_users')||'{}'),
      proData:JSON.parse(localStorage.getItem('sac_pro_data')||'{}')
    };
    fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(body)})
    .catch(function(){});
  },300); // 300ms debounce
}

function getMyData(){
  var sess=getProSession();if(!sess) return null;
  var all=getAllData();
  if(!all[sess.username]) all[sess.username]={tokens:300,bets:0,storia:[],avatar:AVATARS[0],nome:'',cognome:''};
  return all[sess.username];
}
function saveMyData(d){var sess=getProSession();if(!sess) return;var all=getAllData();all[sess.username]=d;saveAllData(all);}

function proRegister(){
  var nm=document.getElementById('proRegNome'),cg=document.getElementById('proRegCognome'),u=document.getElementById('proRegU'),p=document.getElementById('proRegP'),p2=document.getElementById('proRegP2');
  if(!nm||!cg||!u||!p||!p2) return;
  var nome=nm.value.trim(),cognome=cg.value.trim(),username=u.value.trim(),pwd=p.value.trim(),pwd2=p2.value.trim();
  if(!nome||!cognome){showToast('Inserisci nome e cognome!','err');return;}
  if(!username||username.length<2){showToast('Username troppo corto!','err');return;}
  if(!pwd||pwd.length<4){showToast('Password min 4 caratteri!','err');return;}
  if(pwd!==pwd2){showToast('Le password non coincidono!','err');return;}
  var users=getUsers();
  if(users[username]){showToast('Username già in uso!','err');return;}
  users[username]=btoa(pwd);saveUsers(users);
  var all=getAllData();
  all[username]={tokens:300,bets:0,storia:[],avatar:AVATARS[selectedAvatarIdx]||AVATARS[0],nome:nome,cognome:cognome};
  saveAllData(all);setProSession({username:username});
  showToast('🎉 300 token!');renderPronostici();
}
function proLogin(){
  var u=document.getElementById('proLoginU'),p=document.getElementById('proLoginP');

}

// ── QUOTE ──
// ══════════════════════════════════════
// SISTEMA QUOTE BOOKMAKER v3
// ══════════════════════════════════════

function getClasse(name){
  var m=name.match(/(\d)/);
  return m?parseInt(m[1]):3;
}

function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
function r2(v){return Math.round(v*100)/100;}

function getMatchStats(team,mList){
  var played=mList.filter(function(m){return m.played&&(m.a===team||m.b===team)});
  var gf=0,gs=0,forma=0;
  played.forEach(function(m){
    var isA=m.a===team;
    gf+=isA?m.g1:m.g2;
    gs+=isA?m.g2:m.g1;
    var win=(isA&&m.g1>m.g2)||(!isA&&m.g2>m.g1);
    var draw=m.g1===m.g2;
    if(win) forma+=0.6; else if(draw) forma+=0.2; else forma-=0.4;
  });
  return {n:played.length,gf:gf,gs:gs,forma:forma};
}

function calcQ(a,b,def,mList){
  var NEUTRA=3.5,MARGINE=1.06;
  var sA=getMatchStats(a,mList);
  var sB=getMatchStats(b,mList);

  // Classe pesa molto: 1a=12, 2a=24, 3a=36, 4a=48, 5a=60
  var rcA=getClasse(a)*12;
  var rcB=getClasse(b)*12;

  // Media gol con regressione verso neutro
  var mgfA=(sA.gf+NEUTRA)/(sA.n+1);
  var mgfB=(sB.gf+NEUTRA)/(sB.n+1);
  var mgsA=(sA.gs+NEUTRA)/(sA.n+1);
  var mgsB=(sB.gs+NEUTRA)/(sB.n+1);

  var attA=mgfA*1.2, attB=mgfB*1.2;
  var difA=1/mgsA, difB=1/mgsB;

  // Peso gol minimo all'inizio (classe domina)
  var wAtt=(sA.n<2&&sB.n<2)?1:3;
  var wDif=(sA.n<2&&sB.n<2)?1:2;

  var rA=rcA+(attA*wAtt)+(difA*wDif)+sA.forma;
  var rB=rcB+(attB*wAtt)+(difB*wDif)+sB.forma;

  // Probabilità 1X2 - coeff 0.007 per differenze marcate
  var diff=rA-rB;
  var p1=clamp(0.40+(diff*0.007),0.10,0.78);
  var p2=clamp(0.40-(diff*0.007),0.10,0.78);
  var pX=clamp(1-(p1+p2),0.07,0.32);

  // Normalizza + margine
  var tot=p1+pX+p2;
  p1=(p1/tot)*MARGINE;
  pX=(pX/tot)*MARGINE;
  p2=(p2/tot)*MARGINE;

  var q1=clamp(r2(1/p1),1.20,9.00);
  var qX=clamp(r2(1/pX),2.50,9.00);
  var q2=clamp(r2(1/p2),1.20,9.00);

  // Over/Under basato su expected goals
  var eg=(mgfA+mgfB)/2;
  var pO35=clamp(eg/4.5,0.25,0.75)*MARGINE;
  var pU35=clamp(1-(eg/4.5),0.25,0.75)*MARGINE;
  var pO45=clamp(eg/5.8,0.15,0.65)*MARGINE;
  var pU45=clamp(1-(eg/5.8),0.35,0.85)*MARGINE;

  var qO35=clamp(r2(1/pO35),1.35,3.50);
  var qU35=clamp(r2(1/pU35),1.35,3.50);
  var qO45=clamp(r2(1/pO45),1.35,3.50);
  var qU45=clamp(r2(1/pU45),1.35,3.50);

  // Entrambe segnano No
  var pBN=clamp((difA+difB)/4,0.30,0.70)*MARGINE;
  var qBN=clamp(r2(1/pBN),1.40,3.20);

  return {q1:q1,qX:qX,q2:q2,qO35:qO35,qU35:qU35,qO45:qO45,qU45:qU45,qBN:qBN};
}

function getShuffledMatches(mList,isF){
  var notPlayed=mList.filter(function(m){return !m.played});
  // Ordina per girone A→B→C→D poi per id
  var arr=notPlayed.map(function(m){return{m:m,isF:isF}});
  arr.sort(function(a,b){
    if(a.m.group<b.m.group) return -1;
    if(a.m.group>b.m.group) return 1;

function drawWheel(angle){
  var canvas=document.getElementById('wheelCanvas');if(!canvas) return;
  var ctx=canvas.getContext('2d'),cx=140,cy=140,r=128;
  ctx.clearRect(0,0,280,280);

  // Usa WHEEL_PRIZES (4 fette) non WHEEL_SLOTS (100)
  var prizes=WHEEL_PRIZES;
  var total=prizes.length;
  var arc=(Math.PI*2)/total;

  // Alone esterno
  var glow=ctx.createRadialGradient(cx,cy,r-5,cx,cy,r+12);
  glow.addColorStop(0,'rgba(245,197,24,0.5)');
  glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(cx,cy,r+12,0,Math.PI*2);
  ctx.fillStyle=glow;ctx.fill();

  for(var i=0;i<total;i++){
    var start=angle+i*arc-Math.PI/2;
    var end2=start+arc;
    var p=prizes[i];

    // Fetta
    var grad=ctx.createRadialGradient(cx,cy,8,cx,cy,r);
    grad.addColorStop(0,p.color+'ff');
    grad.addColorStop(1,p.color+'99');
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,end2);
    ctx.closePath();ctx.fillStyle=grad;ctx.fill();

    // Bordo fetta
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,end2);
    ctx.closePath();ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=2;ctx.stroke();

    // Posizione testo: al centro della fetta, a 2/3 del raggio
    var mid=angle+i*arc+arc/2-Math.PI/2;
    var tx=cx+Math.cos(mid)*80;
    var ty=cy+Math.sin(mid)*80;

    ctx.save();
    ctx.translate(tx,ty);
    ctx.rotate(mid+Math.PI/2);

    // Ombra testo
    ctx.shadowColor='rgba(0,0,0,0.8)';
    ctx.shadowBlur=6;

    // Numero token grande
    ctx.fillStyle='#ffffff';
    ctx.font='bold 22px Anton,sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(p.tokens,0,-8);

    // Label TOKEN piccola
    ctx.font='bold 10px DM Sans,sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.fillText('TOKEN',0,10);

    ctx.shadowBlur=0;
    ctx.restore();
  }

  // Bordo esterno dorato
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(245,197,24,0.8)';ctx.lineWidth=4;ctx.stroke();

  // Centro
  ctx.beginPath();ctx.arc(cx,cy,28,0,Math.PI*2);
  var cg=ctx.createRadialGradient(cx,cy,0,cx,cy,28);
  cg.addColorStop(0,'#243050');cg.addColorStop(1,'#0c1526');
  ctx.fillStyle=cg;ctx.fill();
  ctx.strokeStyle='rgba(245,197,24,0.9)';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#f5c518';
  ctx.font='bold 14px Anton,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('SAC',cx,cy);

  // Freccia puntatore sopra
  ctx.beginPath();
  ctx.moveTo(cx-14,cy-r-4);
  ctx.lineTo(cx+14,cy-r-4);
  ctx.lineTo(cx,cy-r+16);
  ctx.closePath();
  var pg=ctx.createLinearGradient(cx,cy-r-4,cx,cy-r+16);
  pg.addColorStop(0,'#f5c518');pg.addColorStop(1,'#d4a00a');
  ctx.fillStyle=pg;ctx.fill();
  ctx.strokeStyle='#000';ctx.lineWidth=1;ctx.stroke();
}

function spinWheel(){
  if(wheelSpinning||getWheelSpunToday()) return;
  wheelSpinning=true;
  document.getElementById('wheelSpinBtn').disabled=true;

  // Usa WHEEL_PRIZES (4 fette) - il premio è determinato dai pesi
  var prizes=WHEEL_PRIZES;
  var total=prizes.length;
  var arc=(Math.PI*2)/total;

  // Calcola l'indice vincente in base al seed giornaliero
  var prizeIdx=getDailyPrizeIdx()%total;
  var prize=prizes[prizeIdx];

  // Calcola l'angolo finale per fermarsi sulla fetta giusta
  var sectorOffset=(Math.random()-0.5)*arc*0.5;
  var targetAngle=-(prizeIdx*arc+arc/2+sectorOffset);
  var spins=(5+Math.floor(Math.random()*4))*Math.PI*2;
  var finalAngle=targetAngle-spins;

  var duration=4500,startTime=performance.now(),startAngle=wheelAngle;
  function animate(now){
    var progress=Math.min((now-startTime)/duration,1);
    var ease=1-Math.pow(1-progress,3);
    wheelAngle=startAngle+(finalAngle-startAngle)*ease;
    drawWheel(wheelAngle);
    if(progress<1){
      requestAnimationFrame(animate);
    } else {
      wheelSpinning=false;
      markWheelSpun();
      addTokens(prize.tokens);
      document.getElementById('wheelResult').textContent='+'+prize.tokens+' TOKEN! 🎉';
      document.getElementById('wheelResultSub').textContent='Saldo aggiornato!';
      document.getElementById('wheelSpinBtn').textContent='Già girata oggi!';
      renderPronostici();
      showToast('🎡 Hai vinto +'+prize.tokens+' token!');
    }
  }
  requestAnimationFrame(animate);
}

// ── BET RESOLUTION ──
function resolveBets(matchId,g1,g2,mvpN,isF){
  var all=getAllData();var resolved=0,winners=0;
  Object.entries(all).forEach(function(e){
    var username=e[0],d=e[1];if(!d.storia||!d.storia.length) return;var changed=false;
    d.storia.forEach(function(bet){
      if(bet.status!=='pending') return;var allSettled=true,anyLost=false;
      bet.schedina.forEach(function(b){var res=checkSel(b);if(res==='pending')allSettled=false;if(res==='lose')anyLost=true;});
      if(anyLost){bet.status='lose';changed=true;resolved++;}
      else if(allSettled){bet.status='win';d.tokens=(d.tokens||0)+bet.vincita;changed=true;resolved++;winners++;}
    });
    if(changed) all[username]=d;
  });
  if(resolved>0){saveAllData(all);if(winners>0) showToast('🏆 '+winners+' scommessa/e pagata/e!');}
}
function checkSel(b){
  var isF2=String(b.matchId).indexOf('f')===0;
  var realId=isF2?parseInt(String(b.matchId).replace('f','')):parseInt(b.matchId);
  var ml=isF2?matchesF:matches;var m=ml.find(function(x){return x.id===realId});
  if(!m||!m.played) return 'pending';
  var g12=m.g1,g22=m.g2,lbl=b.label;
  if(b.market==='1x2'){if(lbl==='1')return g12>g22?'win':'lose';if(lbl==='X')return g12===g22?'win':'lose';if(lbl==='2')return g22>g12?'win':'lose';}
  if(b.market==='ou35'){var t=g12+g22;return lbl.indexOf('Over')===0?(t>3?'win':'lose'):(t<=3?'win':'lose');}
  if(b.market==='ou45'){var t2=g12+g22;return lbl.indexOf('Over')===0?(t2>4?'win':'lose'):(t2<=4?'win':'lose');}
  if(b.market==='btts') return (g12===0||g22===0)?'win':'lose';
  return 'pending';
}

    }

  } catch(e){ setSyncStatus('err','Errore'); }
}
function resolveMyBets(){
  // Controlla e paga le scommesse dell'utente corrente
  // usando i risultati attuali in matches/matchesF (caricati da JSONBin)
  var d=getMyData(); if(!d||!d.storia||!d.storia.length) return;
  var changed=false, winners=0;
  d.storia.forEach(function(bet){
    if(bet.status!=='pending') return;
    var allSettled=true, anyLost=false;
    bet.schedina.forEach(function(b){
      var res=checkSel(b);
      if(res==='pending') allSettled=false;
      if(res==='lose') anyLost=true;
    });
    if(anyLost){
      bet.status='lose';
      changed=true;
    } else if(allSettled){
      bet.status='win';
      d.tokens=(d.tokens||0)+bet.vincita;
      changed=true;
      winners++;
    }
  });
  if(changed){
    saveMyData(d);
    if(winners>0) showToast('🏆 Scommessa vinta! +token');
  }
}

        '<div style="font-family:Anton,sans-serif;font-size:34px;letter-spacing:3px;background:linear-gradient(90deg,var(--gold),#fff,var(--gold));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite">Pronostici</div>'+

    }
    return;
  }

  resolveMyBets();
  var d=getMyData();
  var tokens=d?d.tokens:0;
  var adsLeft=3-getAdsToday();
  var wheelReady=!getWheelSpunToday();
  var displayName=(d&&d.nome&&d.cognome)?d.nome+' '+d.cognome:sess.username;
  var myAvatar=(d&&d.avatar)?d.avatar:AVATARS[0];
  var qt=proQT(),vincita=Math.round(proPuntata*qt);
  var h='';

  // Topbar
  h+='<div class="pro-topbar">';
  h+='<div class="pro-topbar-av" onclick="openProAccountPopup()" style="cursor:pointer">'+myAvatar+'</div>';
  h+='<div class="pro-topbar-info">';
  h+='<div class="pro-token-num">🪙 '+tokens+'</div>';
  h+='<div class="pro-token-lbl">'+displayName+'</div>';
  h+='</div>';
  h+='<div style="display:flex;gap:6px">';
  h+='<button onclick="refreshPro()" style="background:rgba(61,142,240,0.1);border:1px solid rgba(61,142,240,0.2);color:var(--blue);padding:7px 10px;border-radius:8px;font-family:DM Sans,sans-serif;font-weight:700;font-size:12px;cursor:pointer">↺</button>';

  h+='</div></div>';

  // Actions - ruota e ads grandi
  h+='<div class="pro-actions-row">';

  h+='<span class="pro-act-btn-icon">🎡</span>';
  h+='<span class="pro-act-btn-lbl">Ruota Fortuna</span>';
  h+='<span class="pro-act-btn-sub">'+(wheelReady?'Disponibile!':'Già girata ✓')+'</span>';
  h+='</button>';
  h+='<button class="pro-act-btn pro-act-ads" disabled style="opacity:.5;cursor:not-allowed">';
  h+='<span class="pro-act-btn-icon">📺</span>';
  h+='<span class="pro-act-btn-lbl">+20 Token</span>';
  h+='<span class="pro-act-btn-sub">Non disponibile</span>';
  h+='</button>';
  h+='</div>';

  h+='<div class="pro-tabs">';

  for(var _ti=0;_ti<_tabs.length;_ti++){
    var _tid=_tabs[_ti][0],_tic=_tabs[_ti][1];
    h+='<button class="pro-tab'+(proActiveTab===_tid?' active':'')+('" onclick="proActiveTab=\''+_tid+'\';renderPronostici()">'+_tic+'</button>');
  }
  h+='</div>';

  // SCOMMESSE
  if(proActiveTab==='scommesse'){
    h+='<div class="pro-league-sw">';
    h+='<button class="pro-league-btn m'+(proLeague==='M'?' active':'')+'" onclick="proLeague=\'M\';renderPronostici()">♂ Maschile</button>';
    h+='<button class="pro-league-btn f'+(proLeague==='F'?' active':'')+'" onclick="proLeague=\'F\';renderPronostici()">♀ Femminile</button>';
    h+='</div>';

    var _upcoming=[];
    if(proLeague!=='F') _upcoming=_upcoming.concat(getShuffledMatches(matches,false));
    if(proLeague==='ALL') proLeague='M';
    if(proLeague!=='M') _upcoming=_upcoming.concat(getShuffledMatches(matchesF,true));
    // no limit

    if(!_upcoming.length){
      h+='<div class="card"><div style="padding:20px;text-align:center;color:var(--muted)">Nessuna partita disponibile 🎉</div></div>';
    } else {
      var _lastGroup='';
      for(var _ui=0;_ui<_upcoming.length;_ui++){
        if(_upcoming[_ui].m.group!==_lastGroup){

        }
        var _um=_upcoming[_ui],_m=_um.m;
        var _mid=_um.isF?('f'+_m.id):String(_m.id);
        var _def=_um.isF?groupsDefF:groupsDef,_ml=_um.isF?matchesF:matches;
        var _q=calcQ(_m.a,_m.b,_def,_ml);
        var _aE=_m.a.replace(/'/g,"\'"),_bE=_m.b.replace(/'/g,"\'"),_isF=_um.isF;
        var _inSched=proSchedina.find(function(b){return b.matchId===_mid});
        var _selLbl=_inSched?_inSched.label:null;
        var _open=openDetails[_mid];
        h+='<div class="pro-match-card">';
        h+='<div class="pro-match-hd" onclick="proToggleDetail(\''+_mid+'\')"><div>';
        h+='<div class="pro-match-name">'+_m.a+' <span style="color:var(--muted);font-size:10px">vs</span> '+_m.b+'</div>';
        h+='<div class="pro-match-sub">Girone '+_m.group+(_um.isF?' <span class="pro-f-badge">♀</span>':'')+' <span style="color:var(--muted)">'+(_open?'▴':'▾')+'</span></div>';
        h+='</div><div class="pro-1x2">';
        h+='<div class="pro-qb'+(_selLbl==='1'?' sel':'')+'" onclick="event.stopPropagation();proSelect(\''+_mid+'\',\'1x2\',\'1\','+_q.q1+')"><span class="pro-qb-l">1</span><span class="pro-qb-v">'+_q.q1+'</span></div>';
        h+='<div class="pro-qb'+(_selLbl==='X'?' sel':'')+'" onclick="event.stopPropagation();proSelect(\''+_mid+'\',\'1x2\',\'X\','+_q.qX+')"><span class="pro-qb-l">X</span><span class="pro-qb-v">'+_q.qX+'</span></div>';
        h+='<div class="pro-qb'+(_selLbl==='2'?' sel':'')+'" onclick="event.stopPropagation();proSelect(\''+_mid+'\',\'1x2\',\'2\','+_q.q2+')"><span class="pro-qb-l">2</span><span class="pro-qb-v">'+_q.q2+'</span></div>';
        h+='</div></div>';
        if(_open){
          var _aE=_m.a.replace(/'/g,"\\'"),_bE=_m.b.replace(/'/g,"\\'");
          h+='<div class="pro-detail open">';
          h+='<div class="pro-mkt-lbl">Over / Under 3.5</div><div class="pro-mkt-row">';
          h+='<div class="pro-mb'+(_selLbl==='Over 3.5'?' sel':'')+'" onclick="proSelect(\''+_mid+'\',\'ou35\',\'Over 3.5\','+_q.qO35+')"><span class="pro-mb-l">Over 3.5</span><span class="pro-mb-v">'+_q.qO35+'</span></div>';
          h+='<div class="pro-mb'+(_selLbl==='Under 3.5'?' sel':'')+'" onclick="proSelect(\''+_mid+'\',\'ou35\',\'Under 3.5\','+_q.qU35+')"><span class="pro-mb-l">Under 3.5</span><span class="pro-mb-v">'+_q.qU35+'</span></div>';
          h+='</div><div class="pro-mkt-lbl">Over / Under 4.5</div><div class="pro-mkt-row">';
          h+='<div class="pro-mb'+(_selLbl==='Over 4.5'?' sel':'')+'" onclick="proSelect(\''+_mid+'\',\'ou45\',\'Over 4.5\','+_q.qO45+')"><span class="pro-mb-l">Over 4.5</span><span class="pro-mb-v">'+_q.qO45+'</span></div>';
          h+='<div class="pro-mb'+(_selLbl==='Under 4.5'?' sel':'')+'" onclick="proSelect(\''+_mid+'\',\'ou45\',\'Under 4.5\','+_q.qU45+')"><span class="pro-mb-l">Under 4.5</span><span class="pro-mb-v">'+_q.qU45+'</span></div>';
          h+='</div><div class="pro-mkt-lbl">Entrambe segnano</div><div class="pro-mkt-row">';
          h+='<div class="pro-mb'+(_selLbl==='No'?' sel':'')+'" onclick="proSelect(\''+_mid+'\',\'btts\',\'No\','+_q.qBN+')"><span class="pro-mb-l">No</span><span class="pro-mb-v">'+_q.qBN+'</span></div>';
          h+='</div>';

          h+='</div>';
        }
        h+='</div>';
      }
    }
  }

  // SCHEDINA
  if(proActiveTab==='schedina'){
    if(!proSchedina.length){
      h+='<div class="card"><div style="padding:24px;text-align:center;color:var(--muted)">Schedina vuota.<br>Vai in 🎯 e scegli le quote.</div></div>';
    } else {
      h+='<div class="pro-sched-wrap"><div class="pro-sched-hd"><div class="pro-sched-title">📋 SCHEDINA ('+proSchedina.length+')</div><button class="pro-sched-rst" onclick="proReset()">✕ Svuota</button></div>';
      for(var _si=0;_si<proSchedina.length;_si++){
        var _b=proSchedina[_si];
        h+='<div class="pro-bet-item"><div class="pro-bet-txt"><div class="pro-bet-teams">'+_b.teamA+' vs '+_b.teamB+(_b.isF?' <span style="font-size:9px;color:var(--pink)">♀</span>':'')+'</div><div class="pro-bet-mkt">'+_b.label+'</div></div><div class="pro-bet-odd">'+_b.odd+'</div><button class="pro-bet-rm" onclick="proRemoveBet(\''+_b.matchId+'\',\''+_b.market+'\')">✕</button></div>';

      h+='<button class="pro-piazza" onclick="piazzaScommessa()"'+(tokens<proPuntata?' disabled':'')+'>PIAZZA SCOMMESSA</button>';
      h+='</div></div>';

  // RANK
  if(proActiveTab==='rank'){
    var _rank=getRank();

    for(var _ri=0;_ri<_rank.length;_ri++){
      var _r=_rank[_ri],_pc=['rk1','rk2','rk3','rk4'][Math.min(_ri,3)];
      var _me=_r.name===sess.username,_dn=(_r.nome&&_r.cognome)?_r.nome+' '+_r.cognome:_r.name;
      h+='<div class="pro-rank-row" style="'+(_me?'background:rgba(245,197,24,0.04)':'')+'">';
      h+='<div style="width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0">'+_r.avatar+'</div>';
      h+='<div class="pro-rk-pos '+_pc+'">'+(_ri+1)+'</div>';
      h+='<div style="flex:1"><div class="pro-rk-name">'+_dn+(_me?' <span style="font-size:10px;color:var(--gold)">(tu)</span>':'')+'</div><div style="font-size:10px;color:var(--blue)">@'+_r.name+'</div></div>';
      h+='<div class="pro-rk-tok">🪙 '+_r.tokens+'</div></div>';
    }
    h+='</div>';
  }

  // STORIA
  if(proActiveTab==='storia'){
    var _st=d&&d.storia?d.storia:[];
    h+='<div class="card"><div class="card-head"><div class="group-badge">📜</div><div class="card-title">Le mie scommesse</div></div>';
    if(!_st.length) h+='<div style="padding:20px;text-align:center;color:var(--muted)">Nessuna scommessa.</div>';
    for(var _xi=0;_xi<_st.length;_xi++){
      var _s=_st[_xi];
      var _date=new Date(_s.ts).toLocaleDateString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
      var _bdg=_s.status==='win'?'<span class="bw">✅ +'+_s.vincita+'🪙</span>':_s.status==='lose'?'<span class="bl">❌ -'+_s.puntata+'🪙</span>':'<span class="bp">⏳ '+_s.qt+'x</span>';
      var _exp=expandedStoria[_s.id];
      h+='<div class="pro-st-row" onclick="expandedStoria['+_s.id+']=!expandedStoria['+_s.id+'];renderPronostici()">';
      h+='<div><div style="font-weight:600;font-size:12px">'+_s.schedina.map(function(x){return x.label}).join(' · ')+'</div><div style="color:var(--muted);font-size:10px">'+_date+' · 🪙'+_s.puntata+'</div></div>'+_bdg+'</div>';
      if(_exp){
        h+='<div class="pro-st-detail open">';
        for(var _di=0;_di<_s.schedina.length;_di++){
          var _sd=_s.schedina[_di];
          h+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03)"><div><div style="font-weight:600">'+_sd.teamA+' vs '+_sd.teamB+'</div><div style="color:var(--gold)">'+_sd.label+'</div></div><div style="font-family:Anton,sans-serif;font-size:14px;color:var(--gold)">'+_sd.odd+'</div></div>';
        }
        h+='<div style="margin-top:6px;display:flex;justify-content:space-between;font-size:11px;color:var(--muted)"><span>Puntata: 🪙'+_s.puntata+'</span><span>Quota: '+_s.qt+'x</span><span>Vincita: 🪙'+_s.vincita+'</span></div></div>';
      }
    }
    h+='</div>';
  }

  // ACCOUNT - solo popup dalla topbar, nessun tab dedicato
  if(proActiveTab==='account'){ proActiveTab='scommesse'; renderPronostici(); return; }

  el.innerHTML=h;
}
