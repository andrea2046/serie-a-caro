<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SAC 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #f5c518;
  --gold2: #e8a000;
  --bg: #05080f;
  --card: #0b1220;
  --card2: #0e1827;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(245,197,24,0.2);
  --text: #f0f4ff;
  --muted: #5a7090;
  --green: #00d68f;
  --red: #ff4757;
  --blue: #4a9eff;
}

* { box-sizing:border-box; margin:0; padding:0 }
html { scroll-behavior:smooth }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══════════════════════════════
   ANIMATED BACKGROUND
═══════════════════════════════ */
.bg-orbs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.12;
  animation: orb-float 8s ease-in-out infinite;
}

.orb-1 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #f5c518, transparent);
  top: -100px; left: -100px;
  animation-delay: 0s;
}

.orb-2 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, #4a9eff, transparent);
  bottom: 20%; right: -80px;
  animation-delay: -3s;
}

.orb-3 {
  width: 200px; height: 200px;
  background: radial-gradient(circle, #00d68f, transparent);
  top: 50%; left: 30%;
  animation-delay: -5s;
}

@keyframes orb-float {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(30px,-20px) scale(1.05); }
  66% { transform: translate(-20px,15px) scale(0.95); }
}

/* ═══════════════════════════════
   HEADER
═══════════════════════════════ */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(5,8,15,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-img {
  height: 46px;
  width: auto;
  filter: drop-shadow(0 0 12px rgba(245,197,24,0.5));
  animation: logo-glow 3s ease-in-out infinite;
}

@keyframes logo-glow {
  0%,100% { filter: drop-shadow(0 0 12px rgba(245,197,24,0.5)); }
  50% { filter: drop-shadow(0 0 20px rgba(245,197,24,0.8)); }
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1;
}

.logo-title {
  font-family: 'Anton', sans-serif;
  font-size: 22px;
  letter-spacing: 3px;
  background: linear-gradient(90deg, var(--gold) 0%, #fff 50%, var(--gold) 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s linear infinite;
}

@keyframes shimmer {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}

.logo-sub {
  font-size: 9px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 3px;
}

.header-btns { display: flex; gap: 8px; align-items: center; }

/* ═══════════════════════════════
   SYNC BAR
═══════════════════════════════ */
.sync-bar {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 16px;
  background: rgba(11,18,32,0.9);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

.sync-left { display: flex; align-items: center; gap: 6px; }

.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot.ok { background: var(--green); box-shadow: 0 0 8px var(--green); }
.dot.err { background: var(--red); }
.dot.loading {
  background: var(--gold);
  animation: pulse-dot 1s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.4; transform:scale(0.7); }
}

/* ═══════════════════════════════
   NAV
═══════════════════════════════ */
.nav {
  position: relative;
  z-index: 10;
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 8px;
}

.nav-btn {
  flex: 1;
  padding: 14px 4px;
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
  transition: color 0.25s;
}

.nav-btn::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  border-radius: 2px 2px 0 0;
  transform: scaleX(0);
  transition: transform 0.25s cubic-bezier(.4,0,.2,1);
}

.nav-btn.active {
  color: var(--gold);
}
.nav-btn.active::after {
  transform: scaleX(1);
}

/* ═══════════════════════════════
   CONTAINERS
═══════════════════════════════ */
.container {
  display: none;
  padding: 16px 12px 80px;
  position: relative;
  z-index: 10;
}
.container.active { display: block; animation: fade-in 0.3s ease; }
@keyframes fade-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ═══════════════════════════════
   CARDS
═══════════════════════════════ */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.card:hover { border-color: var(--border2); }

.card-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px 10px;
  border-bottom: 1px solid var(--border);
}

.group-badge {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Anton', sans-serif;
  font-size: 14px;
  color: #000;
  flex-shrink: 0;
}

.card-title {
  font-family: 'Anton', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--text);
}

/* ═══════════════════════════════
   TABLE
═══════════════════════════════ */
.standings-table {
  width: 100%;
  border-collapse: collapse;
}

.standings-table th {
  background: rgba(255,255,255,0.02);
  color: var(--muted);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 8px 10px;
  text-align: center;
}

.standings-table th:nth-child(2) { text-align:left; }

.standings-table td {
  padding: 11px 10px;
  text-align: center;
  border-top: 1px solid rgba(255,255,255,0.04);
  font-size: 13px;
  font-weight: 500;
}

.standings-table td:nth-child(2) {
  text-align: left;
  font-weight: 600;
  font-size: 13px;
}

.standings-table td:nth-child(1) {
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
}

.standings-table tr.qual-row td {
  background: rgba(0,214,143,0.04);
}

.standings-table tr.qual-row td:nth-child(2) {
  color: var(--green);
}

.standings-table tr.qual-row td:nth-child(1)::before {
  content: '';
  display: inline-block;
  width: 3px; height: 12px;
  background: var(--green);
  border-radius: 2px;
  margin-right: 6px;
  vertical-align: middle;
}

.standings-table tr:hover td {
  background: rgba(255,255,255,0.03);
}

/* ═══════════════════════════════
   MATCH ROWS
═══════════════════════════════ */
.match-row {
  display: grid;
  grid-template-columns: 1fr 72px 1fr;
  align-items: center;
  padding: 13px 14px;
  border-top: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
  gap: 6px;
}

.match-row:hover { background: rgba(255,255,255,0.02); }
.match-row.clickable { cursor: pointer; }
.match-row.clickable:active { background: rgba(245,197,24,0.05); }

.match-team-name {
  font-weight: 600;
  font-size: 12px;
  line-height: 1.3;
}

.match-team-name.home { text-align: left; }
.match-team-name.away { text-align: right; }

.score-pill {
  background: rgba(245,197,24,0.08);
  border: 1px solid rgba(245,197,24,0.15);
  border-radius: 10px;
  text-align: center;
  padding: 5px 4px;
}

.score-pill-num {
  font-family: 'Anton', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  color: var(--gold);
  line-height: 1;
}

.score-pill-vs {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 1px;
}

.mvp-pill {
  margin: 0 14px 10px;
  padding: 5px 10px;
  background: rgba(245,197,24,0.06);
  border: 1px solid rgba(245,197,24,0.1);
  border-radius: 20px;
  font-size: 11px;
  color: var(--gold);
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

/* ═══════════════════════════════
   SCORERS
═══════════════════════════════ */
.scorer-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.scorer-item:last-child { border-bottom: none; }
.scorer-item:hover { background: rgba(255,255,255,0.02); }

.scorer-pos {
  font-family: 'Anton', sans-serif;
  font-size: 24px;
  min-width: 28px;
  text-align: center;
  line-height: 1;
}

.pos-1 { color: var(--gold); text-shadow: 0 0 20px rgba(245,197,24,0.5); }
.pos-2 { color: #b0bec5; }
.pos-3 { color: #bf8c4c; }
.pos-other { color: var(--muted); font-size: 16px; }

.scorer-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  flex-shrink: 0;
  overflow: hidden;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  background: var(--card2);
  font-weight: 700;
  font-size: 13px;
  color: var(--muted);
}

.scorer-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
}

.scorer-info { flex: 1; }
.scorer-name { font-weight: 700; font-size: 14px; }
.scorer-meta {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
  display: flex;
  gap: 12px;
}

.meta-goals { color: var(--gold); font-weight: 600; }
.meta-mvp { color: #b0bec5; }

/* ═══════════════════════════════
   MATCH VIEW
═══════════════════════════════ */
.score-hero {
  background: linear-gradient(135deg, #0a1525 0%, #050810 100%);
  padding: 30px 20px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.score-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(245,197,24,0.08) 0%, transparent 70%);
}

.score-hero-num {
  font-family: 'Anton', sans-serif;
  font-size: 72px;
  letter-spacing: 12px;
  color: var(--gold);
  line-height: 1;
  position: relative;
  text-shadow: 0 0 40px rgba(245,197,24,0.3);
}

.score-hero-teams {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  position: relative;
}

/* ═══════════════════════════════
   BUTTONS
═══════════════════════════════ */
.btn {
  border: none;
  padding: 10px 18px;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.3px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-gold {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  color: #000;
  box-shadow: 0 4px 20px rgba(245,197,24,0.25);
}
.btn-gold:hover { box-shadow: 0 6px 30px rgba(245,197,24,0.4); transform: translateY(-1px); }
.btn-gold:active { transform: translateY(0); }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

.btn-danger {
  background: rgba(255,71,87,0.1);
  color: var(--red);
  border: 1px solid rgba(255,71,87,0.2);
  padding: 4px 10px;
  font-size: 12px;
  border-radius: 7px;
}

.btn-blue {
  background: rgba(74,158,255,0.1);
  color: var(--blue);
  border: 1px solid rgba(74,158,255,0.2);
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  justify-content: center;
}

.btn-green {
  background: linear-gradient(135deg, var(--green), #00b377);
  color: #000;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  font-size: 15px;
  justify-content: center;
  margin-top: 14px;
  box-shadow: 0 4px 20px rgba(0,214,143,0.2);
}

.btn-back {
  background: rgba(74,158,255,0.08);
  color: var(--blue);
  border: 1px solid rgba(74,158,255,0.15);
  border-radius: 10px;
  margin-bottom: 14px;
}

/* ═══════════════════════════════
   POPUP — BOTTOM SHEET
═══════════════════════════════ */
.popup {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(6px);
}

.popup-sheet {
  background: #0d1827;
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 24px 24px 0 0;
  padding: 8px 18px 40px;
  width: 100%;
  max-width: 500px;
  max-height: 92vh;
  overflow-y: auto;
  animation: slide-up 0.3s cubic-bezier(.4,0,.2,1);
}

@keyframes slide-up {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.sheet-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 8px auto 18px;
}

.sheet-title {
  font-family: 'Anton', sans-serif;
  font-size: 18px;
  letter-spacing: 2px;
  color: var(--gold);
  text-align: center;
  margin-bottom: 20px;
}

/* ═══════════════════════════════
   FORM
═══════════════════════════════ */
.form-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin: 14px 0 6px;
  display: block;
}

input, select {
  width: 100%;
  padding: 11px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  box-sizing: border-box;
}

input:focus, select:focus {
  border-color: var(--gold);
  background: rgba(245,197,24,0.04);
}

.section-divider {
  font-family: 'Anton', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--muted);
  margin: 18px 0 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ═══════════════════════════════
   PLAYER ROWS
═══════════════════════════════ */
.p-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 6px;
}

.p-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--card2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--muted);
  flex-shrink: 0;
  overflow: hidden;
}

.p-avatar img { width:100%; height:100%; object-fit:cover; }
.p-name { flex:1; font-weight:600; font-size:13px; }
.p-goals { font-size:12px; color:var(--gold); margin-right:8px; }
.p-actions { display:flex; gap:6px; align-items:center; }
.photo-btn { font-size:16px; cursor:pointer; }

/* ═══════════════════════════════
   TOAST
═══════════════════════════════ */
.toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  padding: 12px 24px;
  border-radius: 100px;
  font-weight: 700;
  font-size: 14px;
  z-index: 300;
  display: none;
  white-space: nowrap;
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}

.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok { background: var(--green); color: #000; display:block; }
.toast.err { background: var(--red); color: #fff; display:block; }

/* ═══════════════════════════════
   EMPTY STATE
═══════════════════════════════ */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}

.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* ═══════════════════════════════
   DELETE BTN
═══════════════════════════════ */
.btn-delete-result {
  display: block;
  width: 100%;
  margin-top: 12px;
  padding: 11px;
  background: rgba(255,71,87,0.08);
  border: 1px solid rgba(255,71,87,0.2);
  color: var(--red);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-delete-result:hover { background: rgba(255,71,87,0.15); }

/* ═══════════════════════════════
   SHOW MORE
═══════════════════════════════ */
.show-more-btn {
  display: block;
  width: 100%;
  padding: 10px;
  background: none;
  border: none;
  border-top: 1px solid var(--border);
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 12px;
  cursor: pointer;
  transition: color 0.2s, background 0.2s;
  letter-spacing: 0.5px;
}
.show-more-btn:hover { color: var(--gold); background: rgba(245,197,24,0.04); }

/* score-pill variante vs */
.score-pill-vs {
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.score-pill-vs:hover { border-color: rgba(245,197,24,0.4); background: rgba(245,197,24,0.05); }
.score-pill-vs-label {
  font-family: 'Anton', sans-serif;
  font-size: 14px;
  letter-spacing: 1px;
  color: var(--muted);
}

/* ═══════════════════════════════
   POLL SHEET
═══════════════════════════════ */
.poll-3grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

.poll-opt {
  position: relative;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  height: 70px;
  transition: border-color 0.2s, transform 0.15s;
}
.poll-opt:hover { transform: translateY(-2px); }
.poll-opt:active { transform: translateY(0); }

.poll-bar-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  transition: width 0.5s ease;
  border-radius: 11px;
}

.poll-opt-inner {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 4px;
}

.poll-choice {
  font-family: 'Anton', sans-serif;
  font-size: 26px;
  letter-spacing: 1px;
  line-height: 1;
  transition: color 0.2s;
}

.poll-pct {
  font-size: 12px;
  font-weight: 700;
  transition: color 0.2s;
}


/* ═══════════════════════════════
   NEWS
═══════════════════════════════ */
.news-fab {
  position: fixed;
  bottom: 24px; right: 16px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border: none;
  color: #000;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(245,197,24,0.4);
  z-index: 50;
  display: none;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
.news-fab:hover { transform: scale(1.08); box-shadow: 0 8px 30px rgba(245,197,24,0.5); }

.news-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
}
.news-card:hover { border-color: var(--border2); transform: translateY(-1px); }

.news-card-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 14px 10px;
}

.news-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.news-meta { flex: 1; }
.news-author { font-weight: 700; font-size: 13px; }
.news-date { font-size: 11px; color: var(--muted); margin-top: 1px; }

.news-title {
  font-family: 'Anton', sans-serif;
  font-size: 17px;
  letter-spacing: 1px;
  padding: 0 14px 8px;
  line-height: 1.3;
}

.news-body {
  font-size: 13px;
  color: #b0c4d8;
  padding: 0 14px 14px;
  line-height: 1.6;
  white-space: pre-wrap;
}

.news-media {
  width: 100%;
  max-height: 260px;
  object-fit: cover;
  display: block;
}

.news-media-audio {
  width: 100%;
  padding: 10px 14px 14px;
  display: block;
}

.news-media-video {
  width: 100%;
  max-height: 260px;
  display: block;
  background: #000;
}

.media-upload-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px dashed var(--border);
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  color: var(--muted);
  transition: border-color 0.2s, background 0.2s;
}
.media-upload-btn:hover { border-color: var(--gold); background: rgba(245,197,24,0.04); color: var(--gold); }

.news-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.news-empty-icon { font-size: 48px; margin-bottom: 12px; }
.news-empty-text { font-size: 14px; }

</style>
</head>

<div id="marcatori" class="container"></div>
<div id="matchView" class="container"></div>
<div id="notizie" class="container"></div>


<!-- POLL POPUP -->
<div class="popup" id="pollPopup">
  <div class="popup-sheet" id="pollSheet">
    <div class="sheet-handle"></div>
  </div>
</div>


<!-- NEWS POPUP -->
<div class="popup" id="newsPop">
  <div class="popup-sheet" style="max-height:95vh">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="newsPopTitle">📰 Nuova notizia</div>

    <label class="form-label">Titolo</label>
    <input id="newsTitle" placeholder="Titolo della notizia" maxlength="80">

    <label class="form-label">Descrizione</label>
    <textarea id="newsBody" placeholder="Scrivi qualcosa..." rows="3"
      style="width:100%;padding:11px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;resize:vertical;box-sizing:border-box;margin-top:0"></textarea>

    <label class="form-label">Media (foto / video / audio)</label>

      <input type="file" id="newsMedia" accept="image/*,video/*,audio/*" style="display:none" onchange="previewMedia(this)">

    <div id="mediaPreview"></div>

    <button class="btn btn-green" onclick="publishNews()" style="margin-top:16px">📢 Pubblica</button>
    <button class="btn btn-danger" id="deleteNewsBtn" onclick="deleteNews()" style="display:none;width:100%;margin-top:8px;justify-content:center;padding:11px">🗑️ Elimina notizia</button>
    <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:8px" onclick="newsPop.style.display='none'">Annulla</button>
  </div>
</div>

<!-- LOGIN -->
<div class="popup" id="loginPopup">
  <div class="popup-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">🔐 Accesso Admin</div>
    <label class="form-label">Password</label>
    <input id="pass" type="password" placeholder="••••••••">
    <button class="btn btn-green" onclick="doLogin()">Entra</button>
    <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:8px" onclick="loginPopup.style.display='none'">Annulla</button>
  </div>
</div>

<!-- MATCH EDIT -->
<div class="popup" id="matchPop">
  <div class="popup-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="popTitle"></div>
    <label class="form-label">Gol Squadra A</label>
    <input id="g1" type="number" min="0" placeholder="0">
    <label class="form-label">Gol Squadra B</label>
    <input id="g2" type="number" min="0" placeholder="0">
    <div id="scorersA"></div>
    <div id="scorersB"></div>
    <label class="form-label">MVP</label>
    <input id="mvp" placeholder="Nome giocatore MVP">
    <button class="btn btn-green" onclick="saveMatch()">💾 &nbsp;Salva partita</button>
    <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:8px" onclick="matchPop.style.display='none'">Annulla</button>
    <button class="btn-delete-result" id="deleteResultBtn" onclick="deleteResult()" style="display:none">🗑️ Elimina risultato</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="news-fab" id="newsFab" onclick="openNewsPop()" title="Nuova notizia">+</button>

<script>
const BIN_ID = "69d681f3856a6821891087c0"
const API_KEY = "$2a$10$x.dSFPS14HXK3N5haPJtm.NxD/i2mFa0.60RKp92TL6nihvWQc06a"
const BIN_URL = "https://api.jsonbin.io/v3/b/" + BIN_ID
const PASSWORD_HASH = "5d28a834728f3baeb111d317aa4606f5bb82c0ce762b534ec91c23c0ed54031a"

let admin = false
let editMatch = null
let tempScorersA = []
let tempScorersB = []

const groupsDef = {
  A: ["🇦🇷 5DE","🇧🇪 3AC","🇵🇦 2EE","🇲🇦 2AC","🇪🇸 1C"],
  B: ["🇮🇹 4DE","🇭🇷 4DE","🇨🇭 2DE","🇰🇷 3BS","🇲🇽 1AC"],
  C: ["🇳🇱 4CS","🇳🇴 3DE","🇺🇾 4BC","🇸🇦 4AM","🇯🇵 1EE"],
  D: ["🇧🇷 5CC","🇵🇹 5AC","🇪🇬 3CC","🇪🇨 5DOI"]
}

let matches = []
let playerImages = {}
let scorers = {}
let mvpCount = {}

function generateMatches() {
  let out = [], id = 0
  Object.entries(groupsDef).forEach(([g, teams]) => {
    for (let i = 0; i < teams.length; i++)
      for (let j = i+1; j < teams.length; j++)
        out.push({ id: id++, group: g, a: teams[i], b: teams[j], g1: null, g2: null, mvp: "", played: false, scorersA: [], scorersB: [] })
  })
  return out
}

async function hashPassword(pwd) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pwd))
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("")
}

function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image()
    const url = URL.createObjectURL(file)
    img.onload = () => {
      const canvas = document.createElement("canvas")
      canvas.width = 60; canvas.height = 60
      const ctx = canvas.getContext("2d")
      const size = Math.min(img.width, img.height)
      ctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0, 0, 60, 60)
      URL.revokeObjectURL(url)
      resolve(canvas.toDataURL("image/jpeg", 0.5))
    }
    img.src = url
  })
}

function setSyncStatus(state, label) {
  document.getElementById("syncDot").className = "dot " + state
  document.getElementById("syncLabel").textContent = label
}

async function binLoad() {
  setSyncStatus("loading", "Caricamento...")
  try {
    const res = await fetch(BIN_URL + "/latest", {
      headers: { "X-Master-Key": API_KEY }
    })
    if (!res.ok) throw new Error("HTTP " + res.status)
    const json = await res.json()
    const data = json.record
    matches = (data.matches && data.matches.length) ? data.matches : generateMatches()
    playerImages = data.playerImages || {}
    setSyncStatus("ok", "Sincronizzato ✓")
  } catch(e) {
    setSyncStatus("err", "Errore connessione")
    showToast("Errore connessione", "err")
    matches = generateMatches()
    playerImages = {}
  }
}

async function binSave() {
  setSyncStatus("loading", "Salvataggio...")
  try {
    const res = await fetch(BIN_URL, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": API_KEY
      },
      body: JSON.stringify({ matches, playerImages })
    })
    if (!res.ok) throw new Error("HTTP " + res.status)
    const ora = new Date().toLocaleTimeString("it-IT", {hour:"2-digit", minute:"2-digit"})
    setSyncStatus("ok", "Salvato alle " + ora + " ✓")
    return true
  } catch(e) {
    setSyncStatus("err", "Errore salvataggio")
    return false
  }
}

function openLogin() { loginPopup.style.display = "flex" }

async function doLogin() {
  const hash = await hashPassword(pass.value)
  if (hash === PASSWORD_HASH) {
    admin = true
    loginPopup.style.display = "none"
    logoutBtn.style.display = "inline-block"
    loginBtn.style.display = "none"
    pass.value = ""
    renderMatches()
  } else {
    alert("Password errata")
  }
}

function logout() {
  admin = false
  logoutBtn.style.display = "none"
  loginBtn.style.display = "inline-block"
  renderMatches()
}

function renderTable() {
  let table = {}
  Object.values(groupsDef).flat().forEach(t => { table[t] = {pt:0,gf:0,gs:0,dr:0} })
  matches.forEach(m => {
    if (!m.played) return
    table[m.a].gf += m.g1; table[m.a].gs += m.g2
    table[m.b].gf += m.g2; table[m.b].gs += m.g1
    if (m.g1 > m.g2) table[m.a].pt += 3
    else if (m.g2 > m.g1) table[m.b].pt += 3
    else { table[m.a].pt++; table[m.b].pt++ }
  })
  Object.keys(table).forEach(t => { table[t].dr = table[t].gf - table[t].gs })
  let html = ""
  Object.entries(groupsDef).forEach(([g, teams]) => {
    let sorted = [...teams].sort((a,b) => {
      if (table[b].pt !== table[a].pt) return table[b].pt - table[a].pt
      if (table[b].dr !== table[a].dr) return table[b].dr - table[a].dr
      return table[b].gf - table[a].gf
    })
    html += `<div class="card"><b>Girone ${g}</b><table>
      <tr><th>#</th><th>Squadra</th><th>PT</th><th>DR</th><th>GF</th><th>GS</th></tr>
      ${sorted.map((t,i) => `<tr class="${i<2?'qual':''}">
        <td>${i+1}</td><td>${t}</td><td>${table[t].pt}</td><td>${table[t].dr}</td><td>${table[t].gf}</td><td>${table[t].gs}</td>
      </tr>`).join("")}
    </table></div>`
  })
  classifica.innerHTML = html
}

function renderMatches() {
  let html = ""
  Object.keys(groupsDef).forEach(g => {
    let m = matches.filter(x => x.group === g)
    html += `<div class="card"><b>Girone ${g}</b>`
    m.forEach(x => {
      html += `<div class="match ${admin?'admin':''}" onclick="openMatch(${x.id})">
        <span>${x.a}</span>
        <span>${x.played ? x.g1+"-"+x.g2 : "-"}</span>
        <span>${x.b}</span>
      </div>${x.mvp ? `<div class="mvp">⭐ MVP: ${x.mvp}</div>` : ""}`
    })
    html += "</div>"
  })
  risultati.innerHTML = html
}

function openMatch(id) {
  let m = matches.find(x => x.id === id)
  if (admin) openMatchAdmin(m)
  else openMatchView(m)
}

function openMatchView(m) {
  changePage("matchView")
  let html = `<button class="back" onclick="changePage('risultati')">← Torna</button>
    <div class="card"><b>${m.a} vs ${m.b}</b>
      <div style="font-size:32px;padding:16px;text-align:center">${m.played ? m.g1+" - "+m.g2 : "Non giocata"}</div>
    </div>`
  ;[["A", m.scorersA, m.a],["B", m.scorersB, m.b]].forEach(([, list, name]) => {
    html += `<div class="card"><b>Marcatori ${name}</b>
      ${list.length
        ? list.map(s => `<div class="playerRow">
            ${playerImages[s.name] ? `<img src="${playerImages[s.name]}" class="playerImg">` : ""}
            <div>${s.name} ⚽ ${s.goals}</div>
          </div>`).join("")
        : "<div style='padding:10px;color:#94a3b8'>Nessuno</div>"}
    </div>`
  })
  matchView.innerHTML = html
}

function openMatchAdmin(m) {
  editMatch = m.id
  matchPop.style.display = "flex"
  popTitle.innerText = m.a + " vs " + m.b
  g1.value = m.g1 ?? ""; g2.value = m.g2 ?? ""; mvp.value = m.mvp ?? ""
  tempScorersA = [...(m.scorersA || [])]
  tempScorersB = [...(m.scorersB || [])]
  scorersA.innerHTML = buildScorersUI("A")
  scorersB.innerHTML = buildScorersUI("B")
  renderTemp("A"); renderTemp("B")
  document.getElementById('deleteResultBtn').style.display = m.played ? 'block' : 'none'
}

function buildScorersUI(side) {
  let opts = ""
  for (let i = 1; i <= 10; i++) opts += `<option value="${i}">${i}</option>`
  return `<div style="margin-top:10px;font-size:12px;color:#94a3b8">Marcatori ${side}</div>
    <div id="list${side}"></div>
    <input id="name${side}" placeholder="Nome giocatore">
    <select id="goal${side}" style="margin:4px 0">${opts}</select>
    <button onclick="addScorer('${side}')" style="width:100%;background:#1d4ed8;margin-bottom:6px">+ Aggiungi marcatore</button>`
}

function addScorer(side) {
  let name = document.getElementById("name"+side).value.trim()
  let goals = parseInt(document.getElementById("goal"+side).value)
  if (!name) return
  let arr = side === "A" ? tempScorersA : tempScorersB
  let ex = arr.find(s => s.name.toLowerCase() === name.toLowerCase())
  if (ex) ex.goals += goals
  else arr.push({ name, goals })
  document.getElementById("name"+side).value = ""
  renderTemp("A"); renderTemp("B")
}

function removeScorer(side, idx) {
  if (side === "A") tempScorersA.splice(idx, 1)
  else tempScorersB.splice(idx, 1)
  renderTemp("A"); renderTemp("B")
}

function renderTemp(side) {
  let arr = side === "A" ? tempScorersA : tempScorersB
  document.getElementById("list"+side).innerHTML = arr.map((s,i) => `
    <div class="playerRow" style="justify-content:space-between">
      <div style="display:flex;align-items:center;gap:8px">
        ${playerImages[s.name] ? `<img src="${playerImages[s.name]}" class="playerImg">` : ""}
        <div style="font-size:13px">${s.name} ⚽ ${s.goals}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <label style="font-size:11px;color:#94a3b8;cursor:pointer">📷
          <input type="file" accept="image/*" style="display:none;width:auto;padding:0;border:none" onchange="uploadPhoto(event,'${s.name}')">
        </label>
        <button onclick="removeScorer('${side}',${i})" style="background:#991b1b;padding:2px 8px;font-size:12px">✕</button>
      </div>
    </div>`).join("")
}

async function uploadPhoto(e, name) {
  const file = e.target.files[0]
  if (!file) return
  showToast("Compressione foto...", "ok")
  const compressed = await compressImage(file)
  playerImages[name] = compressed
  renderTemp("A"); renderTemp("B"); renderScorers()
  await binSave()
  showToast("📷 Foto salvata!", "ok")
}

async function saveMatch() {
  let m = matches.find(x => x.id === editMatch)
  m.g1 = parseInt(g1.value) || 0
  m.g2 = parseInt(g2.value) || 0
  m.mvp = mvp.value.trim()
  m.played = true
  m.scorersA = [...tempScorersA]
  m.scorersB = [...tempScorersB]
  rebuildScorers()
  matchPop.style.display = "none"
  renderMatches(); renderTable(); renderScorers()
  const ok = await binSave()
  if (ok) showToast("✅ Salvato!")
  else showToast("Errore salvataggio!", "err")
}

function rebuildScorers() {
  scorers = {}; mvpCount = {}
  matches.forEach(match => {
    if (!match.played) return
    ;[...match.scorersA, ...match.scorersB].forEach(s => {
      let key = s.name.toLowerCase()
      if (!scorers[key]) scorers[key] = { name: s.name, goals: 0 }
      scorers[key].goals += s.goals
    })
    if (match.mvp) {
      let key = match.mvp.toLowerCase()
      mvpCount[key] = (mvpCount[key] || 0) + 1
    }
  })
}

function renderScorers() {
  let sorted = Object.values(scorers).sort((a,b) => b.goals - a.goals)
  let html = `<div class="card"><b>Classifica Marcatori</b></div>`
  if (!sorted.length)
    html += `<div class="card"><div style="padding:12px;color:#94a3b8">Nessun gol ancora segnato.</div></div>`
  sorted.forEach((s,i) => {
    let medal = i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1)+"."
    let mvps = mvpCount[s.name.toLowerCase()] || 0
    html += `<div class="card"><div class="playerRow">
      ${playerImages[s.name] ? `<img src="${playerImages[s.name]}" class="playerImg">` : ""}
      <div>${medal} ${s.name}<br>
        <span style="font-size:12px;color:#94a3b8">⚽ ${s.goals} gol &nbsp; ⭐ ${mvps} MVP</span>
      </div></div></div>`
  })
  marcatori.innerHTML = html
}

function changePage(p) {
  document.querySelectorAll(".container").forEach(c => c.classList.remove("active"))
  document.getElementById(p).classList.add("active")
}

function showToast(msg, type="ok") {
  toast.textContent = msg
  toast.className = "toast " + type
  toast.style.display = "block"
  setTimeout(() => toast.style.display = "none", 2500)
}

async function init() {
  await binLoad()
  rebuildScorers()
  renderMatches()
  renderTable()
  renderScorers()
}
init()
</script>
</body>
</html>


<script>
// ── OVERRIDE CHANGEPAGE con animazione nav ──
changePage = function(p, btn) {
  document.querySelectorAll(".container").forEach(c => c.classList.remove("active"));
  document.getElementById(p).classList.add("active");
  if (btn) {
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }
};

// ── OVERRIDE RENDERTABLE ──
renderTable = function() {
  let table = {}
  Object.values(groupsDef).flat().forEach(t => { table[t] = {pt:0,gf:0,gs:0,dr:0} })
  matches.forEach(m => {
    if (!m.played) return
    table[m.a].gf += m.g1; table[m.a].gs += m.g2
    table[m.b].gf += m.g2; table[m.b].gs += m.g1
    if (m.g1 > m.g2) table[m.a].pt += 3
    else if (m.g2 > m.g1) table[m.b].pt += 3
    else { table[m.a].pt++; table[m.b].pt++ }
  })
  Object.keys(table).forEach(t => { table[t].dr = table[t].gf - table[t].gs })

  let html = ""
  Object.entries(groupsDef).forEach(([g, teams]) => {
    let sorted = [...teams].sort((a,b) => {
      if (table[b].pt !== table[a].pt) return table[b].pt - table[a].pt
      if (table[b].dr !== table[a].dr) return table[b].dr - table[a].dr
      return table[b].gf - table[a].gf
    })
    html += `<div class="card">
      <div class="card-head">
        <div class="group-badge">${g}</div>
        <div class="card-title">Girone ${g}</div>
      </div>
      <table class="standings-table">
        <thead><tr><th>#</th><th>Squadra</th><th>PT</th><th>DR</th><th>GF</th><th>GS</th></tr></thead>
        <tbody>${sorted.map((t,i) => `<tr class="${i<2?'qual-row':''}">
          <td>${i+1}</td><td>${t}</td><td>${table[t].pt}</td><td style="color:${table[t].dr>=0?'#e8f0fe':'#ff4757'}">${table[t].dr>=0?'+':''}${table[t].dr}</td><td>${table[t].gf}</td><td>${table[t].gs}</td>
        </tr>`).join("")}</tbody>
      </table>
    </div>`
  })
  classifica.innerHTML = html
};

// ── ELIMINA RISULTATO ──
function deleteResult() {
  if (!confirm('Sei sicuro di voler eliminare questo risultato?')) return
  let m = matches.find(x => x.id === editMatch)
  m.g1 = null; m.g2 = null; m.mvp = ""
  m.played = false; m.scorersA = []; m.scorersB = []
  rebuildScorers()
  matchPop.style.display = 'none'
  renderMatches(); renderTable(); renderScorers()
  firebaseSave().then(ok => { if(ok) showToast("✅ Risultato eliminato!") })
}

// ── SONDAGGI ──
function getVotes(matchId) {
  try { return JSON.parse(localStorage.getItem('sac_v_' + matchId) || '{"1":0,"x":0,"2":0}') }
  catch(e) { return {"1":0,"x":0,"2":0} }
}
function getUserVote(matchId) { return localStorage.getItem('sac_uv_' + matchId) || null }
function castVote(matchId, choice) {
  const prev = getUserVote(matchId)
  let votes = getVotes(matchId)
  if (prev) votes[prev] = Math.max(0, votes[prev] - 1)
  if (prev !== choice) {
    votes[choice] = (votes[choice] || 0) + 1
    localStorage.setItem('sac_uv_' + matchId, choice)
  } else {
    localStorage.removeItem('sac_uv_' + matchId)
  }
  localStorage.setItem('sac_v_' + matchId, JSON.stringify(votes))
  // Aggiorna solo la pill e il sheet senza re-render completo
  updatePollUI(matchId, votes, getUserVote(matchId))
  // Riaggiona anche il sheet se aperto
  const m = matches.find(x => x.id === matchId)
  if (m && pollPopup.style.display === 'flex') openPoll(matchId, m.a, m.b)
}

function updatePollUI(matchId, votes, uv) {
  // Aggiorna la pill nella lista partite
  const pills = document.querySelectorAll('[data-pollid="' + matchId + '"]')
  pills.forEach(pill => {
    const uvColor = uv==="1"?"#4a9eff":uv==="x"?"#f5c518":uv==="2"?"#ff4757":null
    const total = votes["1"] + votes["x"] + votes["2"]
    if (uv) {
      pill.innerHTML = `<div style="font-family:'Anton',sans-serif;font-size:16px;color:${uvColor};letter-spacing:1px;line-height:1">${uv.toUpperCase()}</div>
        <div style="font-size:9px;color:var(--muted);margin-top:1px">${total}v</div>`
      pill.style.borderColor = uvColor + '44'
      pill.style.background = uvColor + '11'
    } else {
      pill.innerHTML = `<div class="score-pill-vs-label">vs</div><div style="font-size:8px;color:var(--muted);margin-top:1px">vota</div>`
      pill.style.borderColor = ''
      pill.style.background = ''
    }
  })
}

function openPoll(matchId, teamA, teamB) {
  const votes = getVotes(matchId)
  const userVote = getUserVote(matchId)
  const total = votes["1"] + votes["x"] + votes["2"]
  const pct = k => total === 0 ? 33 : Math.round((votes[k] / total) * 100)

  const btn = (k, label, color) => {
    const active = userVote === k
    const p = pct(k)
    return `<div class="poll-opt" onclick="castVote(${matchId},'${k}')"
      style="border-color:${active ? color : 'var(--border)'};background:${active ? color+'15' : 'transparent'}">
      <div class="poll-bar-fill" style="width:${p}%;background:${color}18"></div>
      <div class="poll-opt-inner">
        <span class="poll-choice" style="color:${active ? color : 'var(--text)'}">${label}</span>
        <span class="poll-pct" style="color:${active ? color : 'var(--muted)'}">${p}%</span>
      </div>
    </div>`
  }

  pollSheet.innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-title" style="font-size:15px;margin-bottom:4px">${teamA}</div>
    <div style="text-align:center;color:var(--muted);font-size:11px;margin-bottom:16px">vs ${teamB}</div>
    <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">
      Chi vince? ${total > 0 ? `<span style="color:var(--gold);margin-left:6px">${total} voti</span>` : ''}
    </div>
    <div class="poll-3grid">
      ${btn("1", "1", "#4a9eff")}
      ${btn("x", "X", "#f5c518")}
      ${btn("2", "2", "#ff4757")}
    </div>
    <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:16px" onclick="pollPopup.style.display='none'">Chiudi</button>
  `
  pollPopup.style.display = 'flex'
}

// ── OVERRIDE RENDERMATCHES ──
renderMatches = function() {
  let html = ""
  Object.keys(groupsDef).forEach(g => {
    let allMatches = matches.filter(x => x.group === g)
    let played = allMatches.filter(x => x.played)
    let notPlayed = allMatches.filter(x => !x.played)
    let sorted = [...played, ...notPlayed]
    const groupId = 'grp_' + g

    html += `<div class="card" style="margin-bottom:10px">
      <div class="card-head">
        <div class="group-badge">${g}</div>
        <div class="card-title">Girone ${g}</div>
        <span style="margin-left:auto;font-size:11px;color:var(--muted)">${played.length}/${allMatches.length}</span>
      </div>
      <div id="${groupId}">`

    // Mostra solo prime 4
    sorted.slice(0, 4).forEach(x => {
      html += matchRowHTML(x)
    })

    html += `</div>`

    // Se ci sono più di 4
    if (sorted.length > 4) {
      html += `<div id="${groupId}_more" style="display:none">`
      sorted.slice(4).forEach(x => { html += matchRowHTML(x) })
      html += `</div>
      <button class="show-more-btn" id="${groupId}_btn"
        onclick="toggleMore('${groupId}')">
        Mostra altre ${sorted.length - 4} partite ▾
      </button>`
    }

    html += `</div>`
  })
  risultati.innerHTML = html
}

function toggleMore(groupId) {
  const more = document.getElementById(groupId + '_more')
  const btn = document.getElementById(groupId + '_btn')
  const isHidden = more.style.display === 'none'
  more.style.display = isHidden ? 'block' : 'none'
  const total = parseInt(btn.textContent.match(/\d+/)[0])
  btn.textContent = isHidden ? 'Mostra meno ▴' : `Mostra altre ${total} partite ▾`
}

function matchRowHTML(x) {
  const votes = getVotes(x.id)
  const uv = getUserVote(x.id)
  const total = votes["1"] + votes["x"] + votes["2"]

  if (x.played) {
    return `<div class="match-row ${admin?'clickable':''}" onclick="${admin?'openMatch('+x.id+')':''}">
      <div class="match-team-name home">${x.a}</div>
      <div class="score-pill"><div class="score-pill-num">${x.g1}-${x.g2}</div></div>
      <div class="match-team-name away">${x.b}</div>
    </div>
    ${x.mvp ? `<div style="padding:0 14px 8px"><div class="mvp-pill">⭐ ${x.mvp}</div></div>` : ''}`
  } else {
    const uvColor = uv==="1"?"#4a9eff":uv==="x"?"#f5c518":uv==="2"?"#ff4757":null
    return `<div class="match-row ${admin?'clickable':''}" onclick="${admin?'openMatch('+x.id+')':''}">
      <div class="match-team-name home">${x.a}</div>
      <div class="score-pill score-pill-vs" onclick="event.stopPropagation();openPoll(${x.id},'${x.a}','${x.b}')">
        ${uv
          ? `<div style="font-family:'Anton',sans-serif;font-size:16px;color:${uvColor};letter-spacing:1px">${uv.toUpperCase()}</div>
             <div style="font-size:9px;color:var(--muted)">${total}v</div>`
          : `<div class="score-pill-vs-label">vs</div>
             <div style="font-size:8px;color:var(--muted);margin-top:1px">vota</div>`}
      </div>
      <div class="match-team-name away">${x.b}</div>
    </div>`
  }
}

// ── OVERRIDE RENDERSCORERS ──
renderScorers = function() {
  let sorted = Object.values(scorers).sort((a,b) => b.goals - a.goals)
  if (!sorted.length) {
    marcatori.innerHTML = `<div class="empty-state"><div class="empty-icon">⚽</div><div class="empty-text">Nessun gol ancora segnato</div></div>`
    return
  }
  let html = `<div class="card">`
  sorted.forEach((s,i) => {
    let mvps = mvpCount[s.name.toLowerCase()] || 0
    let initials = s.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2)
    let posClass = i===0?'pos-1':i===1?'pos-2':i===2?'pos-3':'pos-other'
    html += `<div class="scorer-item">
      <div class="scorer-pos ${posClass}">${i+1}</div>
      <div class="scorer-avatar">
        ${playerImages[s.name] ? `<img src="${playerImages[s.name]}" alt="">` : initials}
      </div>
      <div class="scorer-info">
        <div class="scorer-name">${s.name}</div>
        <div class="scorer-meta">
          <span class="meta-goals">⚽ ${s.goals} gol</span>
          ${mvps ? `<span class="meta-mvp">⭐ ${mvps} MVP</span>` : ''}
        </div>
      </div>
    </div>`
  })
  html += "</div>"
  marcatori.innerHTML = html
};

// ── OVERRIDE OPENMATCHVIEW ──
openMatchView = function(m) {
  changePage('matchView')
  let html = `<button class="btn btn-back" onclick="changePage('risultati')">← Torna</button>
  <div class="card">
    <div class="score-hero">
      <div class="score-hero-num">${m.played ? m.g1+' - '+m.g2 : 'vs'}</div>
      <div class="score-hero-teams"><span>${m.a}</span><span>${m.b}</span></div>
    </div>
    ${m.mvp ? `<div style="padding:12px 16px 4px"><div class="mvp-pill">⭐ MVP: ${m.mvp}</div></div>` : ''}
  </div>`

  ;[['A', m.scorersA, m.a],['B', m.scorersB, m.b]].forEach(([, list, name]) => {
    html += `<div class="card">
      <div class="card-head"><div class="group-badge">⚽</div><div class="card-title">Marcatori ${name}</div></div>`
    if (list.length) {
      list.forEach(s => {
        let initials = s.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2)
        html += `<div class="scorer-item">
          <div class="scorer-avatar">
            ${playerImages[s.name] ? `<img src="${playerImages[s.name]}" alt="">` : initials}
          </div>
          <div class="scorer-info">
            <div class="scorer-name">${s.name}</div>
            <div class="scorer-meta"><span class="meta-goals">⚽ ${s.goals} gol</span></div>
          </div>
        </div>`
      })
    } else {
      html += `<div class="empty-state" style="padding:20px"><div class="empty-text">Nessun marcatore</div></div>`
    }
    html += `</div>`
  })

};

// ── OVERRIDE BUILDSCORERSUI ──
buildScorersUI = function(side) {
  let opts = ""
  for (let i=1;i<=10;i++) opts += `<option value="${i}">${i}</option>`
  return `<div class="section-divider">Marcatori ${side}</div>
    <div id="list${side}"></div>
    <input id="name${side}" placeholder="Nome giocatore" style="margin-bottom:8px">
    <select id="goal${side}" style="margin-bottom:8px">${opts}</select>

// ── OVERRIDE RENDERTEMP ──
renderTemp = function(side) {
  let arr = side==="A" ? tempScorersA : tempScorersB
  document.getElementById("list"+side).innerHTML = arr.map((s,i) => {
    let initials = s.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2)
    return `<div class="p-row">
      <div class="p-avatar">

      </div>

      <div class="p-goals">⚽ ${s.goals}</div>
      <div class="p-actions">
        <label class="photo-btn" title="Foto">📷<input type="file" accept="image/*" style="display:none" onchange="uploadPhoto(event,'${s.name}')"></label>
        <button class="btn btn-danger" onclick="removeScorer('${side}',${i})">✕</button>
      </div>
    </div>`

};

// ── OVERRIDE SHOWTOAST con animazione ──
showToast = function(msg, type="ok") {
  toast.textContent = msg
  toast.className = "toast " + type
  toast.style.display = "block"
  requestAnimationFrame(() => toast.classList.add("show"))
  setTimeout(() => {
    toast.classList.remove("show")
    setTimeout(() => toast.style.display="none", 300)
  }, 2500)
};

// ═══════════════════════════════
// NEWS SYSTEM
// ═══════════════════════════════
let newsList = []
let editingNewsId = null
let pendingMediaB64 = null
let pendingMediaType = null

async function loadNews() {
  try {
    const res = await fetch("https://api.jsonbin.io/v3/b/" + BIN_ID + "/latest", {
      headers: { "X-Master-Key": API_KEY }
    })
    const json = await res.json()
    newsList = json.record.news || []
  } catch(e) { newsList = [] }
  renderNews()
}

async function saveNews() {
  try {
    const rec = await fetch("https://api.jsonbin.io/v3/b/" + BIN_ID + "/latest", {
      headers: { "X-Master-Key": API_KEY }
    }).then(r => r.json()).then(j => j.record)
    rec.news = newsList
    await fetch("https://api.jsonbin.io/v3/b/" + BIN_ID, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
      body: JSON.stringify(rec)
    })
  } catch(e) { console.error(e) }
}

function renderNews() {
  const el = document.getElementById('notizie')
  if (!el) return

  // Mostra FAB solo se admin e nella tab notizie
  const fab = document.getElementById('newsFab')
  if (fab) fab.style.display = admin ? 'flex' : 'none'

  if (!newsList.length) {
    el.innerHTML = `<div class="news-empty">
      <div class="news-empty-icon">📰</div>
      <div class="news-empty-text">${admin ? 'Nessuna notizia. Premi + per pubblicare.' : 'Nessuna notizia ancora.'}</div>
    </div>`
    return
  }

  const sorted = [...newsList].sort((a,b) => b.ts - a.ts)
  el.innerHTML = sorted.map(n => {
    const date = new Date(n.ts).toLocaleDateString('it-IT', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})
    let mediaHtml = ''
    if (n.media) {
      if (n.mediaType.startsWith('image')) {
        mediaHtml = `<img src="${n.media}" class="news-media" alt="">`
      } else if (n.mediaType.startsWith('video')) {
        mediaHtml = `<video src="${n.media}" class="news-media-video" controls playsinline></video>`
      } else if (n.mediaType.startsWith('audio')) {
        mediaHtml = `<audio src="${n.media}" class="news-media-audio" controls></audio>`
      }
    }
    return `<div class="news-card" onclick="${admin ? 'openNewsEdit('+JSON.stringify(n.id)+')' : ''}">
      ${mediaHtml}
      <div class="news-card-head">
        <div class="news-avatar">🏆</div>
        <div class="news-meta">
          <div class="news-author">SAC Admin</div>
          <div class="news-date">${date}</div>
        </div>
      </div>
      <div class="news-title">${n.title}</div>
      ${n.body ? `<div class="news-body">${n.body}</div>` : ''}
    </div>`
  }).join('')
}

function openNewsPop() {
  editingNewsId = null
  pendingMediaB64 = null
  pendingMediaType = null
  document.getElementById('newsTitle').value = ''
  document.getElementById('newsBody').value = ''
  document.getElementById('newsMedia').value = ''
  document.getElementById('mediaPreview').innerHTML = ''
  document.getElementById('mediaUploadText').textContent = '📎 Seleziona file'
  document.getElementById('newsPopTitle').textContent = '📰 Nuova notizia'
  document.getElementById('deleteNewsBtn').style.display = 'none'
  newsPop.style.display = 'flex'
}

function openNewsEdit(id) {
  if (!admin) return
  const n = newsList.find(x => x.id === id)
  if (!n) return
  editingNewsId = id
  pendingMediaB64 = n.media || null
  pendingMediaType = n.mediaType || null
  document.getElementById('newsTitle').value = n.title
  document.getElementById('newsBody').value = n.body || ''
  document.getElementById('newsPopTitle').textContent = '✏️ Modifica notizia'
  document.getElementById('deleteNewsBtn').style.display = 'flex'
  const prev = document.getElementById('mediaPreview')
  if (n.media) {
    if (n.mediaType.startsWith('image')) prev.innerHTML = `<img src="${n.media}" style="width:100%;border-radius:10px;margin-top:8px">`
    else if (n.mediaType.startsWith('video')) prev.innerHTML = `<video src="${n.media}" style="width:100%;border-radius:10px;margin-top:8px" controls></video>`
    else if (n.mediaType.startsWith('audio')) prev.innerHTML = `<audio src="${n.media}" style="width:100%;margin-top:8px" controls></audio>`
  } else {
    prev.innerHTML = ''
  }
  document.getElementById('mediaUploadText').textContent = n.media ? '✅ Media caricato' : '📎 Seleziona file'
  newsPop.style.display = 'flex'
}

function previewMedia(input) {
  const file = input.files[0]
  if (!file) return
  document.getElementById('mediaUploadText').textContent = '⏳ Caricamento...'
  const reader = new FileReader()
  reader.onload = ev => {
    pendingMediaB64 = ev.target.result
    pendingMediaType = file.type
    document.getElementById('mediaUploadText').textContent = '✅ ' + file.name
    const prev = document.getElementById('mediaPreview')
    if (file.type.startsWith('image')) {
      prev.innerHTML = `<img src="${pendingMediaB64}" style="width:100%;border-radius:10px;margin-top:8px;max-height:200px;object-fit:cover">`
    } else if (file.type.startsWith('video')) {
      prev.innerHTML = `<video src="${pendingMediaB64}" style="width:100%;border-radius:10px;margin-top:8px" controls></video>`
    } else if (file.type.startsWith('audio')) {
      prev.innerHTML = `<audio src="${pendingMediaB64}" style="width:100%;margin-top:8px" controls></audio>`
    }
  }
  reader.readAsDataURL(file)
}

async function publishNews() {
  const title = document.getElementById('newsTitle').value.trim()
  if (!title) { showToast("Inserisci un titolo!", "err"); return }

  if (editingNewsId) {
    const n = newsList.find(x => x.id === editingNewsId)
    n.title = title
    n.body = document.getElementById('newsBody').value.trim()
    if (pendingMediaB64 !== n.media) {
      n.media = pendingMediaB64
      n.mediaType = pendingMediaType
    }
  } else {
    newsList.push({
      id: Date.now(),
      ts: Date.now(),
      title,
      body: document.getElementById('newsBody').value.trim(),
      media: pendingMediaB64,
      mediaType: pendingMediaType
    })
  }

  newsPop.style.display = 'none'
  renderNews()
  showToast("📢 Pubblicato!")
  await saveNews()
}

async function deleteNews() {
  if (!editingNewsId) return
  if (!confirm('Eliminare questa notizia?')) return
  newsList = newsList.filter(x => x.id !== editingNewsId)
  newsPop.style.display = 'none'
  renderNews()
  showToast("🗑️ Eliminata")
  await saveNews()
}

// Mostra/nascondi FAB in base alla tab attiva
const _cp = changePage
changePage = function(p, btn) {
  _cp(p, btn)
  const fab = document.getElementById('newsFab')
  if (fab) fab.style.display = (admin && p === 'notizie') ? 'flex' : 'none'
}

// Override init per caricare news
const _origInit = init
init = async function() {
  await _origInit()
  await loadNews()
}
